<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mauncho Law Advocates — Legal Practice Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Gold, White, Black Theme */
            --gold: #c9a84c;
            --gold-light: #d4b96a;
            --gold-dark: #8b6914;
            --gold-bg: #fdf8ed;
            --white: #ffffff;
            --off-white: #fafaf9;
            --cream: #f5f0e8;
            --black: #000000;
            --near-black: #111111;
            --dark-gray: #1a1a1a;
            --charcoal: #2c2c2c;
            --border: #e0e0e0;
            --border-light: #f0f0f0;
            --text: #2c2c2c;
            --muted: #6b5e4a;
            --header-bg: #000000;
            --accent: #8b6914;
            --success: #2d5016;
            --warning: #8b6914;
            --danger: #8b2500;
            --judiciary-red: #8b1a1a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #ffffff;
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 100px;
        }
        .app-header {
            background: #000000;
            padding: 14px 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border-bottom: 2px solid var(--gold);
        }
        .logo-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }
        .logo-icon {
            width: 52px;
            height: 52px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            background: #ffffff;
            border: 2px solid var(--gold);
            padding: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 4px;
        }
        .logo-text { flex: 1; }
        .logo-text .brand {
            font-family: 'Playfair Display', serif;
            font-weight: 800;
            font-size: 18px;
            color: #ffffff;
            letter-spacing: 1.5px;
            line-height: 1.1;
        }
        .logo-text .brand-sub {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 11px;
            color: var(--gold);
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .logo-text .tagline {
            font-size: 8px;
            color: #a09070;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }
        .doc-number {
            background: rgba(201, 168, 76, 0.15);
            border: 1px solid rgba(201, 168, 76, 0.4);
            border-radius: 6px;
            padding: 5px 12px;
            font-size: 11px;
            color: var(--gold);
            font-weight: 700;
            letter-spacing: 1.5px;
            font-family: 'Rajdhani', sans-serif;
        }
        .tabs { display: flex; gap: 4px; }
        .tab {
            flex: 1;
            padding: 11px 8px;
            text-align: center;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 10px;
            letter-spacing: 1.5px;
            color: #999999;
            background: none;
            border: none;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.25s;
            border-radius: 6px 6px 0 0;
            text-transform: uppercase;
        }
        .tab.active {
            color: #ffffff;
            background: rgba(255,255,255,0.08);
            border-bottom: 3px solid var(--gold);
        }
        .tab:hover:not(.active) { color: var(--gold-light); }
        .content { padding: 16px; max-width: 700px; margin: 0 auto; }
        .section-card {
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 13px 16px;
            background: #fafaf9;
            border-bottom: 1px solid var(--border);
        }
        .section-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            background: var(--gold);
        }
        .section-title {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--near-black);
        }
        .form-body { padding: 14px 16px; }
        .field-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .field-row .field { flex: 1; }
        .field { margin-bottom: 10px; }
        .field label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--muted);
            margin-bottom: 4px;
            font-family: 'Rajdhani', sans-serif;
        }
        .field input, .field select, .field textarea {
            width: 100%;
            padding: 9px 11px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            color: var(--text);
            background: #ffffff;
            transition: all 0.2s;
            outline: none;
        }
        .field input:focus, .field select:focus, .field textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.15);
            background: #ffffff;
        }
        .items-table-wrap { overflow-x: auto; padding: 0 0 4px; }
        .items-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 700px; }
        .items-table thead tr { background: #fafaf9; }
        .items-table th {
            padding: 9px 6px; text-align: left; font-family: 'Rajdhani', sans-serif;
            font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
            text-transform: uppercase; color: var(--muted); border-bottom: 2px solid var(--border); white-space: nowrap;
        }
        .items-table th.center, .items-table td.center { text-align: center; }
        .items-table th.right, .items-table td.right { text-align: right; }
        .items-table tbody tr { border-bottom: 1px solid var(--border-light); }
        .items-table td { padding: 6px 6px; vertical-align: middle; }
        .items-table td input {
            width: 100%; border: 1px solid transparent; border-radius: 5px;
            padding: 4px 5px; font-size: 11px; font-family: 'DM Sans', sans-serif;
            color: var(--text); background: transparent; outline: none; transition: all 0.18s;
        }
        .items-table td input:focus { border-color: var(--gold); background: #ffffff; box-shadow: 0 0 0 2px rgba(201, 168, 76, 0.1); }
        .items-table td input.desc { min-width: 120px; }
        .items-table td input.code { width: 70px; text-align: center; font-family: 'Rajdhani', sans-serif; font-weight: 600; }
        .items-table td input.hours { width: 48px; text-align: center; }
        .items-table td input.rate { text-align: right; width: 68px; }
        .row-total { font-weight: 700; color: var(--near-black); font-size: 12px; white-space: nowrap; }
        .del-btn {
            background: none; border: none; cursor: pointer; padding: 3px 6px;
            color: #b91c1c; font-size: 20px; border-radius: 5px; transition: all 0.15s; line-height: 1;
        }
        .del-btn:hover { background: #fef2f2; }
        .add-row-btn {
            display: flex; align-items: center; gap: 6px; margin: 10px 0 0;
            padding: 8px 12px; background: none; border: 1.5px dashed var(--gold);
            border-radius: 8px; color: var(--gold-dark); font-family: 'DM Sans', sans-serif;
            font-size: 12px; font-weight: 600; cursor: pointer; width: 100%; transition: all 0.2s;
        }
        .add-row-btn:hover { background: var(--gold-bg); }
        .totals-block { margin-top: 14px; }
        .totals-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; color: var(--muted); border-bottom: 1px solid var(--border-light); }
        .totals-row .label { font-weight: 500; }
        .totals-row .val { font-weight: 700; color: var(--text); }
        .grand-total-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 10px; padding: 13px 14px; background: #000000; border-radius: 10px;
        }
        .grand-total-row .label { font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 2px; color: #cccccc; text-transform: uppercase; }
        .grand-total-row .val { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; color: var(--gold); }
        .adj-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .adj-row label { font-size: 12px; color: var(--muted); min-width: 70px; font-weight: 500; }
        .adj-row input { width: 65px; padding: 5px 7px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 12px; font-family: 'DM Sans', sans-serif; text-align: right; outline: none; transition: border-color 0.2s; }
        .adj-row input:focus { border-color: var(--gold); }
        .adj-row .adj-label { font-size: 11px; color: var(--muted); }
        .badge {
            display: inline-flex; align-items: center; gap: 5px; background: var(--gold-bg);
            border: 1px solid var(--gold-light); border-radius: 20px; padding: 3px 11px;
            font-size: 10px; color: var(--gold-dark); font-weight: 600; margin-bottom: 10px;
        }
        .status-pills { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
        .status-pill {
            padding: 5px 14px; border-radius: 20px; font-size: 10px; font-weight: 700;
            border: 1.5px solid var(--border); cursor: pointer; transition: all 0.2s;
            font-family: 'Rajdhani', sans-serif; letter-spacing: 1px; background: #fafaf9; color: var(--muted);
        }
        .status-pill.active-paid { background: #e6f0dc; border-color: #2d5016; color: #2d5016; }
        .status-pill.active-partial { background: #faf3d0; border-color: #8b6914; color: #8b6914; }
        .status-pill.active-unpaid { background: #fde8e8; border-color: #8b2500; color: #8b2500; }
        .field textarea { resize: none; line-height: 1.5; }
        .divider { height: 1px; background: var(--border); margin: 12px 0; }
        .actions { padding: 4px 0; display: flex; flex-direction: column; gap: 10px; }
        .btn-whatsapp, .btn-download {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            border: none; border-radius: 10px; font-family: 'Rajdhani', sans-serif;
            font-weight: 700; letter-spacing: 2px; cursor: pointer; transition: all 0.25s;
            color: #ffffff; padding: 14px; font-size: 14px;
        }
        .btn-whatsapp { background: #000000; border: 2px solid var(--gold); }
        .btn-whatsapp:hover { background: var(--gold-dark); border-color: var(--gold-dark); transform: translateY(-2px); }
        .btn-download { background: #000000; box-shadow: 0 4px 14px rgba(0,0,0,0.2); }
        .btn-download:hover { background: var(--near-black); transform: translateY(-2px); }
        .float-chat {
            position: fixed; bottom: 22px; right: 16px; z-index: 999;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .float-share-btn {
            width: 58px; height: 58px; border-radius: 50%; background: var(--gold);
            border: 2px solid #000000; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3); position: relative; transition: transform 0.2s;
        }
        .float-share-btn:hover { transform: scale(1.08); }
        .float-share-btn svg { width: 28px; height: 28px; fill: #000000; }
        .pulse-ring {
            position: absolute; border-radius: 50%; width: 58px; height: 58px;
            background: rgba(201, 168, 76, 0.4); animation: pulse 2s ease-out infinite; pointer-events: none;
        }
        .pulse-ring:nth-child(2) { animation-delay: 0.8s; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(2.3); opacity: 0; }
        }
        .share-badge {
            position: absolute; top: -9px; right: -9px; background: #000000; color: var(--gold);
            font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 8px;
            letter-spacing: 0.8px; border-radius: 6px; padding: 2px 6px; border: 1px solid var(--gold); white-space: nowrap;
        }
        .toast {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            background: #000000; color: #ffffff; padding: 10px 22px; border-radius: 10px;
            font-size: 13px; font-weight: 500; box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            z-index: 9999; border-left: 4px solid var(--gold); animation: toastIn 0.3s ease; white-space: nowrap;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75); z-index: 10000;
            display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px;
        }
        .loading-overlay .spinner {
            width: 44px; height: 44px; border: 4px solid rgba(255,255,255,0.3);
            border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-overlay .text { color: #ffffff; font-family: 'Rajdhani', sans-serif; font-weight: 700; letter-spacing: 2.5px; font-size: 14px; }
        .hidden { display: none !important; }
        .firm-info-bar {
            background: #fafaf9; border: 1px solid var(--border); border-radius: 8px;
            padding: 10px 14px; margin-bottom: 14px; font-size: 10px; color: var(--muted);
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
        }
        .firm-info-bar span { display: flex; align-items: center; gap: 4px; }

        /* Judiciary Calendar Styles */
        .calendar-section { background: #ffffff; }
        .judiciary-header {
            background: #000000;
            color: #ffffff; padding: 12px 16px; text-align: center;
            border-radius: 12px 12px 0 0; border-bottom: 2px solid var(--gold);
        }
        .judiciary-header .shield {
            font-size: 20px; font-family: 'Playfair Display', serif;
            font-weight: 800; letter-spacing: 2px; color: var(--gold);
        }
        .judiciary-header .motto {
            font-size: 8px; font-style: italic; opacity: 0.8; letter-spacing: 1px; color: #cccccc;
        }
        .calendar-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 14px; background: #fafaf9; border-bottom: 1px solid var(--border);
        }
        .calendar-nav button {
            background: none; border: 1px solid var(--border); padding: 6px 12px;
            border-radius: 6px; cursor: pointer; font-family: 'Rajdhani', sans-serif;
            font-weight: 700; font-size: 12px; color: var(--near-black); transition: all 0.2s;
        }
        .calendar-nav button:hover { background: var(--gold); color: #ffffff; border-color: var(--gold); }
        .calendar-nav .month-label {
            font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px;
            letter-spacing: 2px; color: var(--near-black);
        }
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
            padding: 8px; background: #fafaf9;
        }
        .calendar-day-header {
            text-align: center; font-family: 'Rajdhani', sans-serif;
            font-weight: 700; font-size: 9px; letter-spacing: 1px;
            color: var(--muted); padding: 6px 2px; background: #ffffff;
        }
        .calendar-day {
            text-align: center; padding: 8px 4px; background: #ffffff;
            border-radius: 4px; cursor: pointer; transition: all 0.2s;
            font-size: 12px; font-weight: 600; position: relative; min-height: 60px;
            border: 1px solid var(--border-light);
        }
        .calendar-day:hover { background: var(--gold-bg); border-color: var(--gold); }
        .calendar-day.today { border: 2px solid #000000; background: #ffffff; }
        .calendar-day.has-matter { background: #fef9f0; border-color: var(--gold-light); }
        .calendar-day.has-matter::after {
            content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
            width: 6px; height: 6px; border-radius: 50%; background: var(--gold);
        }
        .calendar-day .matter-count {
            font-size: 8px; font-weight: 700; color: var(--gold-dark);
            display: block; margin-top: 2px;
        }
        .calendar-day.empty { color: #cccccc; cursor: default; border-color: transparent; }
        .calendar-day.empty:hover { background: #ffffff; border-color: transparent; }
        .matters-list { padding: 12px 14px; }
        .matter-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 12px; margin-bottom: 8px; background: #fafaf9;
            border-left: 3px solid var(--gold); border-radius: 6px; transition: all 0.2s;
        }
        .matter-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .matter-item .matter-info { flex: 1; }
        .matter-item .matter-title { font-weight: 700; font-size: 13px; color: var(--near-black); }
        .matter-item .matter-detail { font-size: 10px; color: var(--muted); margin-top: 2px; }
        .matter-item .matter-actions { display: flex; gap: 6px; }
        .matter-item .matter-actions button {
            padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer;
            font-size: 10px; font-weight: 600; transition: all 0.2s;
            font-family: 'Rajdhani', sans-serif; letter-spacing: 1px;
        }
        .btn-edit { background: #f0f0f0; color: var(--near-black); }
        .btn-edit:hover { background: #e0e0e0; }
        .btn-delete { background: #fde8e8; color: #8b2500; }
        .btn-delete:hover { background: #f5c6c6; }
        .reminder-badge {
            display: inline-block; background: #fef9f0; color: var(--gold-dark);
            padding: 2px 8px; border-radius: 10px; font-size: 9px; font-weight: 700;
            margin-left: 6px; animation: pulse-reminder 2s ease-in-out infinite;
            border: 1px solid var(--gold-light);
        }
        @keyframes pulse-reminder {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .add-matter-btn {
            display: flex; align-items: center; gap: 6px; margin: 10px 14px;
            padding: 10px 14px; background: #000000; color: var(--gold);
            border: 1px solid var(--gold); border-radius: 8px; cursor: pointer; font-family: 'Rajdhani', sans-serif;
            font-weight: 700; font-size: 12px; letter-spacing: 1.5px; width: calc(100% - 28px);
            transition: all 0.2s; justify-content: center;
        }
        .add-matter-btn:hover { background: var(--gold-dark); color: #ffffff; }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 10001;
            display: flex; align-items: center; justify-content: center;
        }
        .modal {
            background: #ffffff; border-radius: 12px; padding: 20px; width: 90%; max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); border: 1px solid var(--border);
        }
        .modal h3 {
            font-family: 'Rajdhani', sans-serif; font-weight: 700; letter-spacing: 2px;
            color: var(--near-black); margin-bottom: 14px;
        }
        .modal .field { margin-bottom: 12px; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
        .modal-actions button {
            padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
            font-family: 'Rajdhani', sans-serif; font-weight: 700; letter-spacing: 1px;
            font-size: 12px; transition: all 0.2s;
        }
    </style>
</head>
<body>

<header class="app-header">
    <div class="logo-row">
        <div class="logo-icon">
            <img src="https://i.ibb.co/mCPRGMdP/IMG-20260506-WA0258.jpg" alt="Mauncho Law Advocates Logo" crossorigin="anonymous">
        </div>
        <div class="logo-text">
            <div class="brand">MAUNCHO LAW</div>
            <div class="brand-sub">ADVOCATES</div>
            <div class="tagline">Laipha House • Third Floor, Nanyuki</div>
        </div>
        <div class="doc-number" id="docNumber">FBN-2024-001</div>
    </div>
    <div class="tabs">
        <button class="tab" onclick="switchTab('BILLING', this)">Billing</button>
        <button class="tab active" onclick="switchTab('CALENDAR', this)">📅 Calendar</button>
    </div>
</header>

<div class="toast" id="toast" style="display:none"></div>
<div class="loading-overlay hidden" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="text">PREPARING DOCUMENT…</div>
</div>

<div class="content" id="mainContent"></div>

<div id="pdfTemplate" style="position:absolute;left:-9999px;top:0;width:794px;pointer-events:none;"></div>

<div class="float-chat">
    <button class="float-share-btn" onclick="handleFloatingShare()" aria-label="Share Legal Bill to WhatsApp">
        <span class="pulse-ring"></span>
        <span class="pulse-ring"></span>
        <span class="share-badge">SHARE</span>

<script>
    // ─── LAZY-LOAD PDF LIBRARIES ───────────────────────────────
    let pdfLibsLoaded = false;

            if (window.html2canvas && window.jspdf) { pdfLibsLoaded = true; return resolve(); }
            const script1 = document.createElement('script');
            script1.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
            script1.onload = () => {
                const script2 = document.createElement('script');
                script2.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                script2.onload = () => { pdfLibsLoaded = true; resolve(); };
                script2.onerror = reject;
                document.head.appendChild(script2);
            };
            script1.onerror = reject;
            document.head.appendChild(script1);
        });
    }

    // ─── APPLICATION STATE ─────────────────────────────────────
    let currentTab = 'CALENDAR';

        dueDate: 'Within 30 Days', matterRef: 'ELC Case No. 45/2024',
        court: 'Nanyuki Law Courts', clientName: 'James Mwangi',
        clientPhone: '+254 722 890123', clientEmail: 'j.mwangi@corporation.co.ke',
        clientAddress: 'Nanyuki Town', clientPin: 'A009XXXXXXY',
        advocatePin: 'P051XXXXXXZ', pracNumber: 'P.105/2019',

        { id:102, title:'Hearing - Succession Cause 12/2024', court:'Nanyuki Law Courts', date:'2026-05-12', time:'10:30 AM', judge:'Hon. Justice Wanjiku', caseNo:'SUC 12/2024', client:'Peter Njoroge' },

    // ─── HELPERS ───────────────────────────────────────────────
    function fmt(n){ return 'KSH '+Number(n).toLocaleString('en-KE',{minimumFractionDigits:2,maximumFractionDigits:2});}
    function fmtPlain(n){ return Number(n).toLocaleString('en-KE',{minimumFractionDigits:2,maximumFractionDigits:2});}
    function calcTotals(){
        const feesSub = lineItems.reduce((s,it)=>s+(it.hours*it.rate),0);
        const disbursements = lineItems.reduce((s,it)=>s+(it.disbursement||0),0);
        const sub = feesSub + disbursements;
        const disc = sub*(discountPct/100);
        const afterDisc = sub-disc;
        const tax = afterDisc*(taxPct/100);
        const grand = afterDisc+tax;
        return {feesSub, disbursements, sub, disc, afterDisc, tax, grand};
    }
    function showToast(msg,d=2500){
        const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
        clearTimeout(window._toastTimer);window._toastTimer=setTimeout(()=>{t.style.display='none';},d);
    }
    function updateField(k,v){ formData[k]=v; if(k==='invoiceNo') document.getElementById('docNumber').textContent=v; }

    // ─── CALENDAR LOGIC ────────────────────────────────────────
    function getMattersForDate(dateStr) {
        return scheduledMatters.filter(m => m.date === dateStr);
    }

    function checkUpcomingReminders() {
        const today = new Date();
        const tomorrow = new Date(today);
        tomorrow.setDate(today.getDate() + 1);
        const tomorrowStr = tomorrow.toISOString().slice(0,10);
        
        const tomorrowMatters = scheduledMatters.filter(m => m.date === tomorrowStr);
        if (tomorrowMatters.length > 0) {
            const matterList = tomorrowMatters.map(m => m.title).join(', ');
            showToast(`🔔 REMINDER: ${tomorrowMatters.length} matter(s) tomorrow - ${matterList}`, 5000);
        }
    }

    function deleteMatter(id) {
        if (confirm('Are you sure you want to remove this matter from the calendar?')) {
            scheduledMatters = scheduledMatters.filter(m => m.id !== id);
            showToast('✅ Matter removed from calendar', 2000);
            render();
        }
    }

    function openMatterModal(matterId = null) {
        editingMatterId = matterId;
        const existing = matterId ? scheduledMatters.find(m => m.id === matterId) : null;
        const modalHTML = `
        <div class="modal-overlay" id="matterModal">
            <div class="modal">
                <h3>${matterId ? '✏️ Update Matter' : '📅 Schedule New Matter'}</h3>
                <div class="field"><label>Matter Title</label><input id="mTitle" value="${existing ? existing.title : ''}" placeholder="e.g., Hearing - Case No."></div>
                <div class="field-row">
                    <div class="field"><label>Date</label><input type="date" id="mDate" value="${existing ? existing.date : ''}"></div>
                    <div class="field"><label>Time</label><input type="time" id="mTime" value="${existing ? existing.time : '09:00'}"></div>
                </div>
                <div class="field-row">
                    <div class="field"><label>Court</label><input id="mCourt" value="${existing ? existing.court : 'Nanyuki Law Courts'}" placeholder="Court name"></div>

                </div>
                <div class="field-row">
                    <div class="field"><label>Case Number</label><input id="mCaseNo" value="${existing ? existing.caseNo : ''}" placeholder="Case reference"></div>
                    <div class="field"><label>Client</label><input id="mClient" value="${existing ? existing.client : ''}" placeholder="Client name"></div>
                </div>
                <div class="modal-actions">
                    <button style="background:#f0f0f0;color:#000;" onclick="closeMatterModal()">Cancel</button>
                    <button style="background:#000;color:#c9a84c;" onclick="saveMatter()">💾 Save Matter</button>
                </div>
            </div>
        </div>`;
        document.body.insertAdjacentHTML('beforeend', modalHTML);
        document.getElementById('matterModal').addEventListener('click', function(e) {
            if (e.target === this) closeMatterModal();
        });
    }

    function closeMatterModal() {
        const modal = document.getElementById('matterModal');
        if (modal) modal.remove();
        editingMatterId = null;
    }

    function saveMatter() {
        const title = document.getElementById('mTitle').value.trim();
        const date = document.getElementById('mDate').value;
        const time = document.getElementById('mTime').value;
        const court = document.getElementById('mCourt').value.trim();
        const judge = document.getElementById('mJudge').value.trim();
        const caseNo = document.getElementById('mCaseNo').value.trim();
        const client = document.getElementById('mClient').value.trim();

        if (!title || !date) { showToast('⚠️ Title and Date are required', 2500); return; }

        const matterData = { title, date, time, court, judge, caseNo, client };

        if (editingMatterId) {
            const idx = scheduledMatters.findIndex(m => m.id === editingMatterId);
            if (idx !== -1) {
                scheduledMatters[idx] = { ...scheduledMatters[idx], ...matterData };
                showToast('✅ Matter updated successfully', 2000);
            }
        } else {
            scheduledMatters.push({ id: nextMatterId++, ...matterData });
            showToast('✅ New matter scheduled', 2000);
        }

        closeMatterModal();
        render();
    }

    function renderCalendar() {
        const today = new Date();
        const todayStr = today.toISOString().slice(0,10);
        const firstDay = new Date(currentYear, currentMonth, 1);
        const lastDay = new Date(currentYear, currentMonth + 1, 0);
        const startDayOfWeek = firstDay.getDay();
        const daysInMonth = lastDay.getDate();
        const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        const dayHeaders = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

        let gridHTML = '';
        for (let i = 0; i < startDayOfWeek; i++) {
            gridHTML += `<div class="calendar-day empty"></div>`;
        }
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const mattersOnDay = getMattersForDate(dateStr);
            const hasMatter = mattersOnDay.length > 0;
            const isToday = dateStr === todayStr;
            gridHTML += `
            <div class="calendar-day${isToday ? ' today' : ''}${hasMatter ? ' has-matter' : ''}" onclick="selectDate('${dateStr}')">
                <strong>${d}</strong>
                ${hasMatter ? `<span class="matter-count">${mattersOnDay.length} Matter(s)</span>` : ''}
            </div>`;
        }

        const selectedMatters = window._selectedDate ? getMattersForDate(window._selectedDate) : [];
        const selectedDateDisplay = window._selectedDate || todayStr;

        return `
        <div class="section-card calendar-section">
            <div class="judiciary-header">
                <div class="shield">⚖️ THE JUDICIARY</div>
                <div class="motto">Justice be our Shield and Defender</div>
            </div>
            <div class="calendar-nav">
                <button onclick="prevMonth()">◀ Prev</button>
                <span class="month-label">${monthNames[currentMonth]} ${currentYear}</span>
                <button onclick="nextMonth()">Next ▶</button>
            </div>
            <div class="calendar-grid">
                ${dayHeaders.map(d => `<div class="calendar-day-header">${d}</div>`).join('')}
                ${gridHTML}
            </div>
            <div style="padding:12px 14px;background:#fafaf9;border-top:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0;">
                <strong style="font-family:'Rajdhani',sans-serif;letter-spacing:1px;color:#000;">📋 Matters for ${new Date(selectedDateDisplay+'T00:00:00').toLocaleDateString('en-KE',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</strong>
            </div>
            <div class="matters-list" id="mattersList">
                ${selectedMatters.length === 0 ? '<p style="color:var(--muted);text-align:center;padding:20px;">No matters scheduled for this date.</p>' : 
                selectedMatters.map(m => `
                <div class="matter-item">
                    <div class="matter-info">
                        <div class="matter-title">${m.title} ${m.date === todayStr ? '<span class="reminder-badge">TODAY</span>' : ''}${isTomorrow(m.date) ? '<span class="reminder-badge">⏰ TOMORROW</span>' : ''}</div>
                        <div class="matter-detail">🏛️ ${m.court} | 🕐 ${m.time} | 👨‍⚖️ ${m.judge || 'TBA'}</div>
                        <div class="matter-detail">📁 ${m.caseNo || 'N/A'} | 👤 ${m.client || 'N/A'}</div>
                    </div>
                    <div class="matter-actions">
                        <button class="btn-edit" onclick="event.stopPropagation();openMatterModal(${m.id})">✏️ Edit</button>
                        <button class="btn-delete" onclick="event.stopPropagation();deleteMatter(${m.id})">🗑️ Delete</button>
                    </div>
                </div>`).join('')}
            </div>
            <button class="add-matter-btn" onclick="openMatterModal()">📅 + Schedule New Matter</button>
        </div>`;
    }

    function isTomorrow(dateStr) {
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        return dateStr === tomorrow.toISOString().slice(0,10);
    }

    function selectDate(dateStr) {
        window._selectedDate = dateStr;
        render();
    }

    function prevMonth() {
        if (currentMonth === 0) { currentMonth = 11; currentYear--; }
        else { currentMonth--; }
        render();
    }

    function nextMonth() {
        if (currentMonth === 11) { currentMonth = 0; currentYear++; }
        else { currentMonth++; }
        render();
    }

    // ─── BILLING RENDER ────────────────────────────────────────
    function renderBilling() {
        const tot = calcTotals();
        const billingTabs = ['FEE_NOTE', 'INVOICE', 'RECEIPT'];
        const activeBillingTab = window._activeBillingTab || 'INVOICE';
        return `
        <div class="firm-info-bar">

        </div>
        <div class="section-card"><div class="section-header"><span class="section-dot"></span><span class="section-title">${activeBillingTab === 'FEE_NOTE' ? 'Fee Note' : activeBillingTab === 'INVOICE' ? 'Tax Invoice' : 'Official Receipt'} Details</span></div><div class="form-body">
          <div class="field-row"><div class="field"><label>${activeBillingTab} Number</label><input value="${formData.invoiceNo}" oninput="updateField('invoiceNo',this.value)"></div><div class="field"><label>Date</label><input type="date" value="${formData.date}" oninput="updateField('date',this.value)"></div></div>
          <div class="field-row"><div class="field"><label>Matter Reference</label><input value="${formData.matterRef}" oninput="updateField('matterRef',this.value)"></div><div class="field"><label>Court / Forum</label><input value="${formData.court}" oninput="updateField('court',this.value)"></div></div>

        </div></div>
        <div class="section-card"><div class="section-header"><span class="section-dot"></span><span class="section-title">Client Information</span></div><div class="form-body">
          <div class="field"><label>Client Name</label><input value="${formData.clientName}" oninput="updateField('clientName',this.value)"></div>
          <div class="field-row"><div class="field"><label>Phone</label><input value="${formData.clientPhone}" oninput="updateField('clientPhone',this.value)"></div><div class="field"><label>Email</label><input value="${formData.clientEmail}" oninput="updateField('clientEmail',this.value)"></div></div>
          <div class="field"><label>Address</label><input value="${formData.clientAddress}" oninput="updateField('clientAddress',this.value)"></div>
          <div class="field-row"><div class="field"><label>Client PIN</label><input value="${formData.clientPin}" oninput="updateField('clientPin',this.value)"></div><div class="field"><label>Advocate PIN</label><input value="${formData.advocatePin}" oninput="updateField('advocatePin',this.value)"></div></div>
          <div class="field"><label>Practising Certificate No.</label><input value="${formData.pracNumber}" oninput="updateField('pracNumber',this.value)"></div>
        </div></div>
        <div class="section-card"><div class="section-header"><span class="section-dot"></span><span class="section-title">Professional Services & Disbursements</span></div>
          <div class="items-table-wrap"><table class="items-table"><thead><tr><th>Code</th><th>Description</th><th class="center">Hours</th><th class="right">Rate/hr</th><th class="right">Disb.</th><th class="right">Total</th><th></th></tr></thead><tbody>
            ${lineItems.map(item=>`<tr><td><input class="code" value="${item.code||''}" oninput="updateItem(${item.id},'code',this.value)"></td><td><input class="desc" value="${item.description}" oninput="updateItem(${item.id},'description',this.value)"></td><td class="center"><input class="hours" type="number" min="0" step="0.5" value="${item.hours}" oninput="updateItem(${item.id},'hours',this.value)"></td><td class="right"><input class="rate" type="number" min="0" step="500" value="${item.rate}" oninput="updateItem(${item.id},'rate',this.value)"></td><td class="right"><input class="rate" type="number" min="0" step="100" value="${item.disbursement||0}" oninput="updateItem(${item.id},'disbursement',this.value)"></td><td class="right"><span class="row-total" id="rowTotal_${item.id}">${fmt(item.hours*item.rate + (item.disbursement||0))}</span></td><td><button class="del-btn" onclick="removeItem(${item.id})">×</button></td></tr>`).join('')}
          </tbody></table></div>
          <div style="padding:4px 16px 16px"><button class="add-row-btn" onclick="addItem()">+ Add Service / Disbursement</button>
          <div class="divider"></div>
          <div class="adj-row"><label>Discount</label><input type="number" min="0" max="100" value="${discountPct}" oninput="updateDiscount(this.value)"><span class="adj-label">%</span></div>
          <div class="adj-row"><label>VAT</label><input type="number" min="0" max="100" value="${taxPct}" oninput="updateTax(this.value)"><span class="adj-label">%</span></div>
          <div class="totals-block"><div class="totals-row"><span>Professional Fees</span><span class="val" id="valFees">${fmt(tot.feesSub)}</span></div><div class="totals-row"><span>Disbursements</span><span class="val" id="valDisbursements">${fmt(tot.disbursements)}</span></div><div class="totals-row"><span>Subtotal</span><span class="val" id="valSubtotal">${fmt(tot.sub)}</span></div><div class="totals-row"><span>Discount</span><span class="val" id="valDiscount">${discountPct>0?'-'+fmt(tot.disc):'—'}</span></div><div class="totals-row"><span>VAT (${taxPct}%)</span><span class="val" id="valTax">${fmt(tot.tax)}</span></div></div>
          <div class="grand-total-row"><span class="label">GRAND TOTAL</span><span class="val" id="valGrand">${fmt(tot.grand)}</span></div>
        </div></div>
        <div class="section-card"><div class="section-header"><span class="section-dot"></span><span class="section-title">Firm Banking Details</span></div><div class="form-body">
          <div class="field-row"><div class="field"><label>Bank</label><input value="${formData.bankName}" oninput="updateField('bankName',this.value)"></div><div class="field"><label>Account Number</label><input value="${formData.bankAccount}" oninput="updateField('bankAccount',this.value)"></div></div>

    // ─── SHARED FUNCTIONS ──────────────────────────────────────
    function addItem(){ lineItems.push({id:nextId++,code:'',description:'',hours:0,rate:0,disbursement:0}); render(); }
    function removeItem(id){ if(lineItems.length<=1){showToast('⚠️ At least one entry required');return;} lineItems=lineItems.filter(i=>i.id!==id); render(); }
    function updateItem(id,field,val){ const item=lineItems.find(i=>i.id===id); if(!item)return; if(field==='hours'||field==='rate'||field==='disbursement') item[field]=parseFloat(val)||0; else item[field]=val; updateTotals(); }
    function updateTotals(){ /* handled in render */ }
    function updateDiscount(v){ discountPct=parseFloat(v)||0; render(); }
    function updateTax(v){ taxPct=parseFloat(v)||0; render(); }
    function setPayment(s){ paymentStatus=s; render(); }

    // ─── PDF FUNCTIONS ─────────────────────────────────────────
    async function generateAndSharePDF(){ showToast('📄 PDF feature available in Billing tab',3000); }
    async function downloadPDF(){ showToast('📄 PDF feature available in Billing tab',3000); }
    function handleFloatingShare(){ generateAndSharePDF(); }

    // ─── MAIN RENDER ───────────────────────────────────────────
    function render() {
        if (currentTab === 'CALENDAR') {
            document.getElementById('mainContent').innerHTML = renderCalendar();
        } else {
            document.getElementById('mainContent').innerHTML = renderBilling();
        }
    }

    function switchTab(tab, el) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        if (tab === 'BILLING') {
            document.getElementById('docNumber').textContent = formData.invoiceNo;
        } else {
            document.getElementById('docNumber').textContent = 'CAL-2026';
        }
        render();
    }

    // ─── INITIALIZATION ────────────────────────────────────────
    window._selectedDate = new Date().toISOString().slice(0,10);
    window._activeBillingTab = 'INVOICE';
    
    // Expose functions globally
    window.switchTab = switchTab;
    window.prevMonth = prevMonth;
    window.nextMonth = nextMonth;
    window.selectDate = selectDate;
    window.openMatterModal = openMatterModal;
    window.closeMatterModal = closeMatterModal;
    window.saveMatter = saveMatter;
    window.deleteMatter = deleteMatter;
    window.addItem = addItem;
    window.removeItem = removeItem;
    window.updateItem = updateItem;
    window.updateDiscount = updateDiscount;
    window.updateTax = updateTax;
    window.setPayment = setPayment;
    window.updateField = updateField;
    window.generateAndSharePDF = generateAndSharePDF;
    window.downloadPDF = downloadPDF;
    window.handleFloatingShare = handleFloatingShare;

    render();
    
    // Check reminders every 30 seconds
    setInterval(checkUpcomingReminders, 30000);
    // Initial reminder check
    setTimeout(checkUpcomingReminders, 1000);
</script>
</body>
</html>

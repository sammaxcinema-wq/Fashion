<script>
(function() {
    // ==================== AUTH MODULE ====================
    const AUTH_KEY = 'mauncho_auth';
    let currentUser = null;

    // Hash password using Web Crypto
    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function saveUser(user) {
        const existing = JSON.parse(localStorage.getItem(AUTH_KEY) || '{}');
        existing[user.username] = {
            passwordHash: user.passwordHash,
            securityQuestion: user.securityQuestion,
            securityAnswerHash: user.securityAnswerHash
        };
        localStorage.setItem(AUTH_KEY, JSON.stringify(existing));
    }

    async function getUser(username) {
        const all = JSON.parse(localStorage.getItem(AUTH_KEY) || '{}');
        return all[username] || null;
    }

    async function registerUser(username, password, question, answer) {
        const existing = await getUser(username);
        if (existing) throw new Error('Username already exists.');
        const passwordHash = await sha256(password);
        const securityAnswerHash = await sha256(answer.toLowerCase().trim());
        const user = { username, passwordHash, securityQuestion: question, securityAnswerHash };
        await saveUser(user);
        return user;
    }

    async function loginUser(username, password) {
        const user = await getUser(username);
        if (!user) throw new Error('User not found.');
        const hash = await sha256(password);
        if (hash !== user.passwordHash) throw new Error('Invalid password.');
        return user;
    }

    async function recoverPassword(username, answer, newPassword) {
        const user = await getUser(username);
        if (!user) throw new Error('User not found.');
        const answerHash = await sha256(answer.toLowerCase().trim());
        if (answerHash !== user.securityAnswerHash) throw new Error('Security answer incorrect.');
        const newHash = await sha256(newPassword);
        user.passwordHash = newHash;
        await saveUser(user);
        return true;
    }

    async function changePassword(username, oldPassword, newPassword) {
        const user = await getUser(username);
        if (!user) throw new Error('User not found.');
        const oldHash = await sha256(oldPassword);
        if (oldHash !== user.passwordHash) throw new Error('Current password is incorrect.');
        const newHash = await sha256(newPassword);
        user.passwordHash = newHash;
        await saveUser(user);
        return true;
    }

    function renderAuth() {
        const container = document.getElementById('authContainer');
        container.innerHTML = `
            <div class="auth-card" id="authCard">
                <div class="brand">MAUNCHO LAW</div>
                <div class="brand-sub">ADVOCATES</div>
                <div id="authFormArea"></div>
            </div>
        `;
        showLoginForm();
    }

    function showLoginForm() {
        document.getElementById('authFormArea').innerHTML = `
            <input type="text" class="auth-input" id="loginUsername" placeholder="Username" autocomplete="username">
            <input type="password" class="auth-input" id="loginPassword" placeholder="Password" autocomplete="current-password">
            <div class="error-msg" id="loginError" style="display:none;"></div>
            <button class="auth-btn" onclick="handleLogin()">Sign In</button>
            <span class="auth-link" onclick="showRecoveryForm()">Forgot password?</span>
            <div class="auth-toggle">Don't have an account? <span onclick="showRegisterForm()">Sign up</span></div>
        `;
    }

    function showRegisterForm() {
        document.getElementById('authFormArea').innerHTML = `
            <input type="text" class="auth-input" id="regUsername" placeholder="Choose a username">
            <input type="password" class="auth-input" id="regPassword" placeholder="Create password">
            <input type="password" class="auth-input" id="regPasswordConfirm" placeholder="Confirm password">
            <input type="text" class="auth-input" id="regQuestion" placeholder="Security question (e.g., Pet's name)">
            <input type="text" class="auth-input" id="regAnswer" placeholder="Your answer">
            <div class="error-msg" id="regError" style="display:none;"></div>
            <button class="auth-btn" onclick="handleRegister()">Create Account</button>
            <div class="auth-toggle">Already have an account? <span onclick="showLoginForm()">Sign in</span></div>
        `;
    }

    function showRecoveryForm() {
        document.getElementById('authFormArea').innerHTML = `
            <p style="margin-bottom:12px; font-size:14px; color:#444;">Reset your password</p>
            <input type="text" class="auth-input" id="recoverUsername" placeholder="Username">
            <input type="text" class="auth-input" id="recoverAnswer" placeholder="Answer to security question">
            <input type="password" class="auth-input" id="recoverNewPassword" placeholder="New password">
            <div class="error-msg" id="recoverError" style="display:none;"></div>
            <button class="auth-btn" onclick="handleRecovery()">Reset Password</button>
            <span class="auth-link" onclick="showLoginForm()">Back to Sign In</span>
        `;
    }

    window.handleLogin = async () => {
        const user = document.getElementById('loginUsername').value.trim();
        const pass = document.getElementById('loginPassword').value;
        const errEl = document.getElementById('loginError');
        if (!user || !pass) { errEl.textContent = 'All fields required.'; errEl.style.display='block'; return; }
        try {
            const logged = await loginUser(user, pass);
            currentUser = logged.username;
            document.getElementById('authContainer').classList.add('hidden');
            document.getElementById('appContainer').classList.remove('hidden');
            document.getElementById('userIconBtn').textContent = user.charAt(0).toUpperCase();
            loadAppData();
            render();
        } catch (e) {
            errEl.textContent = e.message; errEl.style.display='block';
        }
    };

    window.handleRegister = async () => {
        const user = document.getElementById('regUsername').value.trim();
        const pass = document.getElementById('regPassword').value;
        const pass2 = document.getElementById('regPasswordConfirm').value;
        const q = document.getElementById('regQuestion').value.trim();
        const a = document.getElementById('regAnswer').value.trim();
        const errEl = document.getElementById('regError');
        if (!user || !pass || !q || !a) { errEl.textContent='All fields required.'; errEl.style.display='block'; return; }
        if (pass !== pass2) { errEl.textContent='Passwords do not match.'; errEl.style.display='block'; return; }
        try {
            await registerUser(user, pass, q, a);
            toast('Account created! Please sign in.', 3000);
            showLoginForm();
        } catch (e) {
            errEl.textContent = e.message; errEl.style.display='block';
        }
    };

    window.handleRecovery = async () => {
        const user = document.getElementById('recoverUsername').value.trim();
        const answer = document.getElementById('recoverAnswer').value.trim();
        const newPass = document.getElementById('recoverNewPassword').value;
        const errEl = document.getElementById('recoverError');
        if (!user || !answer || !newPass) { errEl.textContent='All fields required.'; errEl.style.display='block'; return; }
        try {
            await recoverPassword(user, answer, newPass);
            toast('Password updated. Please sign in.', 3000);
            showLoginForm();
        } catch (e) {
            errEl.textContent = e.message; errEl.style.display='block';
        }
    };

    window.logout = () => {
        currentUser = null;
        document.getElementById('appContainer').classList.add('hidden');
        document.getElementById('authContainer').classList.remove('hidden');
        renderAuth();
    };

    window.toggleUserMenu = () => {
        const dropdown = document.getElementById('userDropdown');
        dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    };

    window.openSettings = () => {
        document.getElementById('userDropdown').style.display = 'none';
        const modal = document.createElement('div');
        modal.className = 'settings-modal';
        modal.innerHTML = `
            <div class="settings-content">
                <h3 style="margin-bottom:16px;font-family:'Rajdhani',sans-serif;">Account Settings</h3>
                <div class="field"><label>Username</label><input value="${currentUser}" disabled></div>
                <div class="field"><label>Current Password</label><input type="password" id="oldPass"></div>
                <div class="field"><label>New Password</label><input type="password" id="newPass1"></div>
                <div class="field"><label>Confirm New Password</label><input type="password" id="newPass2"></div>
                <div class="error-msg" id="settingsError" style="display:none;"></div>
                <div style="display:flex; gap:8px; margin-top:12px;">
                    <button class="auth-btn" onclick="handleChangePassword()">Update Password</button>
                    <button class="auth-btn" style="background:#888;" onclick="this.closest('.settings-modal').remove()">Cancel</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    };

    window.handleChangePassword = async () => {
        const old = document.getElementById('oldPass').value;
        const n1 = document.getElementById('newPass1').value;
        const n2 = document.getElementById('newPass2').value;
        const err = document.getElementById('settingsError');
        if (!old || !n1 || !n2) { err.textContent='All fields required.'; err.style.display='block'; return; }
        if (n1 !== n2) { err.textContent='New passwords do not match.'; err.style.display='block'; return; }
        try {
            await changePassword(currentUser, old, n1);
            toast('Password updated successfully.', 3000);
            document.querySelector('.settings-modal').remove();
        } catch (e) {
            err.textContent = e.message; err.style.display='block';
        }
    };

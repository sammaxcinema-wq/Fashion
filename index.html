<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mauncho Law Advocates — Legal Practice Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #d4b96a;
            --gold-dark: #8b6914;
            --gold-bg: #fdf8ed;
            --white: #ffffff;
            --off-white: #fafaf9;
            --black: #000000;
            --near-black: #111111;
            --dark-gray: #1a1a1a;
            --charcoal: #2c2c2c;
            --border: #e0e0e0;
            --border-light: #f0f0f0;
            --text: #2c2c2c;
            --muted: #6b5e4a;
            --success: #2d5016;
            --danger: #8b2500;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #ffffff;
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 100px;
        }
        .app-header {
            background: #000000;
            padding: 14px 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border-bottom: 2px solid var(--gold);
        }
        .logo-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }
        .logo-icon {
            width: 52px;
            height: 52px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            background: #ffffff;
            border: 2px solid var(--gold);
            padding: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 4px;
        }
        .logo-text { flex: 1; }
        .logo-text .brand {
            font-family: 'Playfair Display', serif;
            font-weight: 800;
            font-size: 18px;
            color: #ffffff;
            letter-spacing: 1.5px;
            line-height: 1.1;
        }
        .logo-text .brand-sub {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 11px;
            color: var(--gold);
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .logo-text .tagline {
            font-size: 8px;
            color: #a09070;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }
        .doc-number {
            background: rgba(201, 168, 76, 0.15);
            border: 1px solid rgba(201, 168, 76, 0.4);
            border-radius: 6px;
            padding: 5px 12px;
            font-size: 11px;
            color: var(--gold);
            font-weight: 700;
            letter-spacing: 1.5px;
            font-family: 'Rajdhani', sans-serif;
        }
        .tabs { display: flex; gap: 4px; }
        .tab {
            flex: 1;
            padding: 11px 8px;
            text-align: center;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 10px;
            letter-spacing: 1.5px;
            color: #999999;
            background: none;
            border: none;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.25s;
            border-radius: 6px 6px 0 0;
            text-transform: uppercase;
        }
        .tab.active {
            color: #ffffff;
            background: rgba(255,255,255,0.08);
            border-bottom: 3px solid var(--gold);
        }
        .tab:hover:not(.active) { color: var(--gold-light); }
        .content { padding: 16px; max-width: 700px; margin: 0 auto; }
        .section-card {
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 13px 16px;
            background: #fafaf9;
            border-bottom: 1px solid var(--border);
        }
        .section-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            background: var(--gold);
        }
        .section-title {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--near-black);
        }
        .form-body { padding: 14px 16px; }
        .field-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .field-row .field { flex: 1; }
        .field { margin-bottom: 10px; }
        .field label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--muted);
            margin-bottom: 4px;
            font-family: 'Rajdhani', sans-serif;
        }
        .field input, .field select, .field textarea {
            width: 100%;
            padding: 9px 11px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            color: var(--text);
            background: #ffffff;
            transition: all 0.2s;
            outline: none;
        }
        .field input:focus, .field select:focus, .field textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.15);
            background: #ffffff;
        }
        .items-table-wrap { overflow-x: auto; padding: 0 0 4px; }
        .items-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 700px; }
        .items-table thead tr { background: #fafaf9; }
        .items-table th {
            padding: 9px 6px; text-align: left; font-family: 'Rajdhani', sans-serif;
            font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
            text-transform: uppercase; color: var(--muted); border-bottom: 2px solid var(--border); white-space: nowrap;
        }
        .items-table th.center, .items-table td.center { text-align: center; }
        .items-table th.right, .items-table td.right { text-align: right; }
        .items-table tbody tr { border-bottom: 1px solid var(--border-light); }
        .items-table td { padding: 6px 6px; vertical-align: middle; }
        .items-table td input {
            width: 100%; border: 1px solid transparent; border-radius: 5px;
            padding: 4px 5px; font-size: 11px; font-family: 'DM Sans', sans-serif;
            color: var(--text); background: transparent; outline: none; transition: all 0.18s;
        }
        .items-table td input:focus { border-color: var(--gold); background: #ffffff; box-shadow: 0 0 0 2px rgba(201, 168, 76, 0.1); }
        .items-table td input.desc { min-width: 120px; }
        .items-table td input.code { width: 70px; text-align: center; font-family: 'Rajdhani', sans-serif; font-weight: 600; }
        .items-table td input.hours { width: 48px; text-align: center; }
        .items-table td input.rate { text-align: right; width: 68px; }
        .row-total { font-weight: 700; color: var(--near-black); font-size: 12px; white-space: nowrap; }
        .del-btn {
            background: none; border: none; cursor: pointer; padding: 3px 6px;
            color: #b91c1c; font-size: 20px; border-radius: 5px; transition: all 0.15s; line-height: 1;
        }
        .del-btn:hover { background: #fef2f2; }
        .add-row-btn {
            display: flex; align-items: center; gap: 6px; margin: 10px 0 0;
            padding: 8px 12px; background: none; border: 1.5px dashed var(--gold);
            border-radius: 8px; color: var(--gold-dark); font-family: 'DM Sans', sans-serif;
            font-size: 12px; font-weight: 600; cursor: pointer; width: 100%; transition: all 0.2s;
        }
        .add-row-btn:hover { background: var(--gold-bg); }
        .totals-block { margin-top: 14px; }
        .totals-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; color: var(--muted); border-bottom: 1px solid var(--border-light); }
        .totals-row .label { font-weight: 500; }
        .totals-row .val { font-weight: 700; color: var(--text); }
        .grand-total-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 10px; padding: 13px 14px; background: #000000; border-radius: 10px;
        }
        .grand-total-row .label { font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 2px; color: #cccccc; text-transform: uppercase; }
        .grand-total-row .val { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; color: var(--gold); }
        .adj-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .adj-row label { font-size: 12px; color: var(--muted); min-width: 70px; font-weight: 500; }
        .adj-row input { width: 65px; padding: 5px 7px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 12px; font-family: 'DM Sans', sans-serif; text-align: right; outline: none; transition: border-color 0.2s; }
        .adj-row input:focus { border-color: var(--gold); }
        .adj-row .adj-label { font-size: 11px; color: var(--muted); }
        .status-pills { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
        .status-pill {
            padding: 5px 14px; border-radius: 20px; font-size: 10px; font-weight: 700;
            border: 1.5px solid var(--border); cursor: pointer; transition: all 0.2s;
            font-family: 'Rajdhani', sans-serif; letter-spacing: 1px; background: #fafaf9; color: var(--muted);
        }
        .status-pill.active-paid { background: #e6f0dc; border-color: #2d5016; color: #2d5016; }
        .status-pill.active-partial { background: #faf3d0; border-color: #8b6914; color: #8b6914; }
        .status-pill.active-unpaid { background: #fde8e8; border-color: #8b2500; color: #8b2500; }
        .field textarea { resize: none; line-height: 1.5; }
        .divider { height: 1px; background: var(--border); margin: 12px 0; }
        .actions { padding: 4px 0; display: flex; flex-direction: column; gap: 10px; }
        .btn-whatsapp, .btn-download {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            border: none; border-radius: 10px; font-family: 'Rajdhani', sans-serif;
            font-weight: 700; letter-spacing: 2px; cursor: pointer; transition: all 0.25s;
            color: #ffffff; padding: 14px; font-size: 14px;
        }
        .btn-whatsapp { background: #25D366; border: 2px solid #25D366; color: #ffffff; }
        .btn-whatsapp:hover { background: #128C7E; border-color: #128C7E; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37, 211, 102, 0.3); }
        .btn-download { background: #000000; box-shadow: 0 4px 14px rgba(0,0,0,0.2); }
        .btn-download:hover { background: var(--near-black); transform: translateY(-2px); }
        .float-chat {
            position: fixed; bottom: 22px; right: 16px; z-index: 999;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .float-share-btn {
            width: 58px; height: 58px; border-radius: 50%; background: #25D366;
            border: 2px solid #ffffff; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4); position: relative; transition: transform 0.2s;
        }
        .float-share-btn:hover { transform: scale(1.08); }
        .float-share-btn svg { width: 28px; height: 28px; fill: #ffffff; }
        .toast {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            background: #000000; color: #ffffff; padding: 10px 22px; border-radius: 10px;
            font-size: 13px; font-weight: 500; box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            z-index: 9999; border-left: 4px solid var(--gold); animation: toastIn 0.3s ease; white-space: nowrap;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75); z-index: 10000;
            display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px;
        }
        .loading-overlay .spinner {
            width: 44px; height: 44px; border: 4px solid rgba(255,255,255,0.3);
            border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-overlay .text { color: #ffffff; font-family: 'Rajdhani', sans-serif; font-weight: 700; letter-spacing: 2.5px; font-size: 14px; }
        .hidden { display: none !important; }
        .firm-info-bar {
            background: #fafaf9; border: 1px solid var(--border); border-radius: 8px;
            padding: 10px 14px; margin-bottom: 14px; font-size: 10px; color: var(--muted);
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
        }
    </style>
</head>
<body>

<header class="app-header">
    <div class="logo-row">
        <div class="logo-icon">
            <img src="https://i.ibb.co/mCPRGMdP/IMG-20260506-WA0258.jpg" alt="Mauncho Law Advocates Logo" crossorigin="anonymous">
        </div>
        <div class="logo-text">
            <div class="brand">MAUNCHO LAW</div>
            <div class="brand-sub">ADVOCATES</div>
            <div class="tagline">Laipha House • Third Floor, Nanyuki</div>
        </div>
        <div class="doc-number" id="docNumber">INV-2024-089</div>
    </div>
    <div class="tabs">
        <button class="tab active" onclick="switchTab('FEE_NOTE', this)">Fee Note</button>
        <button class="tab" onclick="switchTab('INVOICE', this)">Invoice</button>
        <button class="tab" onclick="switchTab('RECEIPT', this)">Receipt</button>
    </div>
</header>

<div class="toast" id="toast" style="display:none"></div>
<div class="loading-overlay hidden" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="text">PREPARING DOCUMENT…</div>
</div>

<div class="content" id="mainContent"></div>

<div id="pdfTemplate" style="position:absolute;left:-9999px;top:0;width:794px;pointer-events:none;"></div>

<div class="float-chat">
    <button class="float-share-btn" onclick="handleFloatingShare()" aria-label="Share to WhatsApp">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347"/></svg>
    </button>
</div>

<script>
    // ─── PDF LIBRARIES ─────────────────────────────────────────
    let pdfLibsLoaded = false;
    const watermarkURL = 'https://i.ibb.co/Kz6kgz9T/file-00000000d254722f993c63521e7dc065.png';
    
    function loadPdfLibs() {
        return new Promise((resolve, reject) => {
            if (pdfLibsLoaded || (window.html2canvas && window.jspdf)) {
                pdfLibsLoaded = true;
                return resolve();
            }
            const script1 = document.createElement('script');
            script1.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
            script1.onload = () => {
                const script2 = document.createElement('script');
                script2.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                script2.onload = () => {
                    pdfLibsLoaded = true;
                    resolve();
                };
                script2.onerror = reject;
                document.head.appendChild(script2);
            };
            script1.onerror = reject;
            document.head.appendChild(script1);
        });
    }

    // ─── APPLICATION STATE ─────────────────────────────────────
    let currentTab = 'INVOICE';
    let lineItems = [
        { id:1, code:'ADV-001', description:'Legal Consultation & Advisory', hours: 3.5, rate: 12000, disbursement: 0 },
        { id:2, code:'DRF-042', description:'Drafting & Filing Plaint', hours: 8.0, rate: 10000, disbursement: 3500 },
        { id:3, code:'CRT-017', description:'Court Attendance', hours: 2.0, rate: 15000, disbursement: 1500 }
    ];
    let nextId = 4;
    let discountPct = 0;
    let taxPct = 16;
    let formData = {
        invoiceNo: 'INV-2024-089', date: new Date().toISOString().slice(0,10),
        dueDate: 'Within 30 Days', matterRef: 'ELC Case No. 45/2024',
        clientName: 'James Mwangi', clientPhone: '+254 722 890123',
        clientEmail: 'j.mwangi@email.com', clientAddress: 'Nanyuki Town',
        notes: 'Professional fees as per Advocates Remuneration Order.',
        terms: 'Payment within 30 days.',
        firmEmail: 'wakilimauncho@gmail.com', firmPhone: '+254 746 389 218',
        firmAddress: 'Laipha House, Third Floor, Nanyuki'
    };
    const logoURL = 'https://i.ibb.co/mCPRGMdP/IMG-20260506-WA0258.jpg';

    // ─── HELPERS ───────────────────────────────────────────────
    function fmt(n){ return 'KSH '+Number(n).toLocaleString('en-KE',{minimumFractionDigits:2,maximumFractionDigits:2});}
    function fmtPlain(n){ return Number(n).toLocaleString('en-KE',{minimumFractionDigits:2,maximumFractionDigits:2});}
    function calcTotals(){
        const feesSub = lineItems.reduce((s,it)=>s+(it.hours*it.rate),0);
        const disbursements = lineItems.reduce((s,it)=>s+(it.disbursement||0),0);
        const sub = feesSub + disbursements;
        const disc = sub*(discountPct/100);
        const afterDisc = sub-disc;
        const tax = afterDisc*(taxPct/100);
        const grand = afterDisc+tax;
        return {feesSub, disbursements, sub, disc, afterDisc, tax, grand};
    }
    function showToast(msg,d=2500){
        const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
        clearTimeout(window._toastTimer);window._toastTimer=setTimeout(()=>{t.style.display='none';},d);
    }
    function updateField(k,v){ formData[k]=v; if(k==='invoiceNo') document.getElementById('docNumber').textContent=v; }

    // ─── PDF GENERATION ────────────────────────────────────────
    function renderPDFTemplate() {
        const tot = calcTotals();
        const logoImgBlock = `<img src="${logoURL}" style="width:56px;height:56px;object-fit:contain;border-radius:6px;border:2px solid #c9a84c;" crossorigin="anonymous">`;
        const watermarkBlock = `
            <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:0;">
                <img src="${watermarkURL}" style="width:500px;height:500px;object-fit:contain;opacity:0.06;" crossorigin="anonymous">
            </div>`;
        
        const itemsRows = lineItems.map(item => 
            `<tr><td style="padding:10px;">${item.code||'—'}</td><td style="padding:10px;font-weight:600;">${item.description||'—'}</td><td style="text-align:center;padding:10px;">${item.hours||0}</td><td style="text-align:right;padding:10px;">${fmtPlain(item.rate)}</td><td style="text-align:right;padding:10px;">${fmtPlain(item.disbursement||0)}</td><td style="text-align:right;font-weight:700;padding:10px;">${fmtPlain(item.hours*item.rate + (item.disbursement||0))}</td></tr>`
        ).join('');

        return `<div style="width:794px;min-height:1123px;background:#fff;padding:48px;font-family:'Inter','DM Sans',sans-serif;color:#1f2937;position:relative;overflow:hidden;">
            ${watermarkBlock}
            <div style="position:relative;z-index:1;">
                <div style="background:#000;margin:-48px -48px 40px;padding:32px 48px;display:flex;justify-content:space-between;align-items:center;border-bottom:4px solid #c9a84c;">
                    <div style="display:flex;align-items:center;gap:14px;">${logoImgBlock}<div><div style="font-family:'Playfair Display',serif;font-weight:800;font-size:20px;color:#fff;">MAUNCHO LAW</div><div style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;color:#c9a84c;">ADVOCATES</div></div></div>
                    <div style="color:#fff;text-align:right;"><h2 style="font-size:22px;font-weight:900;">TAX INVOICE</h2><p style="color:#c9a84c;">#${formData.invoiceNo}</p></div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-bottom:32px;">
                    <div><h3 style="font-weight:900;">BILL TO:</h3><p style="font-size:18px;font-weight:700;">${formData.clientName}</p><p>${formData.matterRef}</p><p>${formData.clientAddress}</p></div>
                    <div style="text-align:right;"><p>Date: ${formData.date}</p><p>Due: ${formData.dueDate}</p><p>📞 ${formData.firmPhone}</p></div>
                </div>
                <table style="width:100%;border-collapse:collapse;"><thead><tr style="background:#f5f0e8;border-top:2px solid #000;border-bottom:2px solid #000;"><th>Code</th><th>Description</th><th style="text-align:center;">Hours</th><th style="text-align:right;">Rate/hr</th><th style="text-align:right;">Disb.</th><th style="text-align:right;">Total</th></tr></thead><tbody>${itemsRows}</tbody></table>
                <div style="display:flex;justify-content:flex-end;margin-top:20px;"><div style="width:300px;"><div style="display:flex;justify-content:space-between;padding:8px 0;">Subtotal<span>${fmtPlain(tot.sub)}</span></div><div style="display:flex;justify-content:space-between;padding:8px 0;">VAT (${taxPct}%)<span>${fmtPlain(tot.tax)}</span></div><div style="background:#000;color:#c9a84c;padding:14px;border-radius:6px;display:flex;justify-content:space-between;font-weight:900;margin-top:8px;">GRAND TOTAL<span>KSH ${fmtPlain(tot.grand)}</span></div></div></div>
                <div style="margin-top:40px;text-align:center;font-size:9px;color:#888;">Thank you for choosing Mauncho Law Advocates • Laipha House, Third Floor, Nanyuki</div>
            </div>
        </div>`;
    }

    async function generatePDFBlob() {
        await loadPdfLibs();
        const templateHTML = renderPDFTemplate();
        const templateEl = document.getElementById('pdfTemplate');
        templateEl.innerHTML = templateHTML;
        await new Promise(r => setTimeout(r, 800));
        
        const canvas = await html2canvas(templateEl, {
            scale: 2, useCORS: true, backgroundColor: '#ffffff', logging: false,
            width: templateEl.scrollWidth, height: templateEl.scrollHeight
        });
        
        const { jsPDF } = window.jspdf;
        const imgData = canvas.toDataURL('image/png');
        const pdf = new jsPDF('p', 'mm', 'a4');
        const pdfWidth = 210;
        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
        pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, Math.min(pdfHeight, 297));
        
        templateEl.innerHTML = '';
        return pdf.output('blob');
    }

    // ─── WHATSAPP SHARING ──────────────────────────────────────
    async function shareToWhatsApp() {
        const loadingEl = document.getElementById('loadingOverlay');
        loadingEl.classList.remove('hidden');
        showToast('📄 Generating PDF for WhatsApp…', 4000);
        
        try {
            const pdfBlob = await generatePDFBlob();
            const pdfName = `Mauncho_Law_${currentTab}_${formData.invoiceNo.replace(/[/#]/g,'_')}.pdf`;
            const file = new File([pdfBlob], pdfName, { type: 'application/pdf' });
            const { grand } = calcTotals();
            const shareText = `*MAUNCHO LAW ADVOCATES*\n⚖️ Laipha House, Third Floor, Nanyuki\n📄 ${currentTab}: ${formData.invoiceNo}\n👤 ${formData.clientName}\n📋 ${formData.matterRef}\n💰 Grand Total: ${fmt(grand)}\n📅 ${formData.date}`;
            
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ title: `Mauncho Law — ${formData.invoiceNo}`, text: shareText, files: [file] });
                showToast('✅ Document shared!', 3000);
            } else {
                const url = URL.createObjectURL(pdfBlob);
                const a = document.createElement('a'); a.href = url; a.download = pdfName;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                setTimeout(() => { window.open(`https://wa.me/?text=${encodeURIComponent(shareText)}`, '_blank'); URL.revokeObjectURL(url); }, 500);
                showToast('📥 PDF downloaded! Opening WhatsApp…', 4000);
            }
        } catch (err) {
            const { grand } = calcTotals();
            window.open(`https://wa.me/?text=${encodeURIComponent(`*MAUNCHO LAW ADVOCATES*\n📄 ${currentTab}: ${formData.invoiceNo}\n💰 Grand Total: ${fmt(grand)}`)}`, '_blank');
        } finally {
            loadingEl.classList.add('hidden');
        }
    }

    async function downloadPDF() {
        const loadingEl = document.getElementById('loadingOverlay');
        loadingEl.classList.remove('hidden');
        showToast('📄 Preparing PDF…', 3000);
        try {
            const pdfBlob = await generatePDFBlob();
            const url = URL.createObjectURL(pdfBlob);
            const a = document.createElement('a'); a.href = url; a.download = `Mauncho_Law_${currentTab}_${formData.invoiceNo.replace(/[/#]/g,'_')}.pdf`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            showToast('✅ PDF downloaded!', 2500);
        } catch (err) { showToast('⚠️ Download failed.', 3000); }
        finally { loadingEl.classList.add('hidden'); }
    }

    function handleFloatingShare() { shareToWhatsApp(); }

    // ─── ITEMS MANAGEMENT ──────────────────────────────────────
    function addItem(){ lineItems.push({id:nextId++,code:'',description:'',hours:0,rate:0,disbursement:0}); render(); }
    function removeItem(id){ if(lineItems.length<=1){showToast('⚠️ At least one item required');return;} lineItems=lineItems.filter(i=>i.id!==id); render(); }
    function updateItem(id,field,val){
        const item=lineItems.find(i=>i.id===id); if(!item)return;
        if(field==='hours'||field==='rate'||field==='disbursement') item[field]=parseFloat(val)||0;
        else item[field]=val;
        render();
    }
    function updateDiscount(v){ discountPct=parseFloat(v)||0; render(); }
    function updateTax(v){ taxPct=parseFloat(v)||0; render(); }

    // ─── RENDER ────────────────────────────────────────────────
    function render(){
        const tot = calcTotals();
        const docType = currentTab === 'FEE_NOTE' ? 'Fee Note' : currentTab === 'INVOICE' ? 'Tax Invoice' : 'Official Receipt';
        document.getElementById('mainContent').innerHTML = `
        <div class="firm-info-bar">
            <span>📍 ${formData.firmAddress}</span>
            <span>📧 ${formData.firmEmail}</span>
            <span>📞 ${formData.firmPhone}</span>
        </div>
        <div class="section-card"><div class="section-header"><span class="section-dot"></span><span class="section-title">${docType} Details</span></div><div class="form-body">
          <div class="field-row"><div class="field"><label>Document Number</label><input value="${formData.invoiceNo}" oninput="updateField('invoiceNo',this.value)"></div><div class="field"><label>Date</label><input type="date" value="${formData.date}" oninput="updateField('date',this.value)"></div></div>
          <div class="field-row"><div class="field"><label>Matter Reference</label><input value="${formData.matterRef}" oninput="updateField('matterRef',this.value)"></div><div class="field"><label>Due Date</label><input value="${formData.dueDate}" oninput="updateField('dueDate',this.value)"></div></div>
        </div></div>
        <div class="section-card"><div class="section-header"><span class="section-dot"></span><span class="section-title">Client Information</span></div><div class="form-body">
          <div class="field"><label>Client Name</label><input value="${formData.clientName}" oninput="updateField('clientName',this.value)"></div>
          <div class="field-row"><div class="field"><label>Phone</label><input value="${formData.clientPhone}" oninput="updateField('clientPhone',this.value)"></div><div class="field"><label>Email</label><input value="${formData.clientEmail}" oninput="updateField('clientEmail',this.value)"></div></div>
          <div class="field"><label>Address</label><input value="${formData.clientAddress}" oninput="updateField('clientAddress',this.value)"></div>
        </div></div>
        <div class="section-card"><div class="section-header"><span class="section-dot"></span><span class="section-title">Professional Services</span></div>
          <div class="items-table-wrap"><table class="items-table"><thead><tr><th>Code</th><th>Description</th><th class="center">Hours</th><th class="right">Rate/hr</th><th class="right">Disb.</th><th class="right">Total</th><th></th></tr></thead><tbody>
            ${lineItems.map(item=>`<tr><td><input class="code" value="${item.code||''}" oninput="updateItem(${item.id},'code',this.value)"></td><td><input class="desc" value="${item.description}" oninput="updateItem(${item.id},'description',this.value)"></td><td class="center"><input class="hours" type="number" min="0" step="0.5" value="${item.hours}" oninput="updateItem(${item.id},'hours',this.value)"></td><td class="right"><input class="rate" type="number" min="0" step="500" value="${item.rate}" oninput="updateItem(${item.id},'rate',this.value)"></td><td class="right"><input class="rate" type="number" min="0" step="100" value="${item.disbursement||0}" oninput="updateItem(${item.id},'disbursement',this.value)"></td><td class="right"><span class="row-total">${fmt(item.hours*item.rate + (item.disbursement||0))}</span></td><td><button class="del-btn" onclick="removeItem(${item.id})">×</button></td></tr>`).join('')}
          </tbody></table></div>
          <div style="padding:4px 16px 16px"><button class="add-row-btn" onclick="addItem()">+ Add Service Line</button>
          <div class="divider"></div>
          <div class="adj-row"><label>Discount</label><input type="number" min="0" max="100" value="${discountPct}" oninput="updateDiscount(this.value)"><span class="adj-label">%</span></div>
          <div class="adj-row"><label>VAT</label><input type="number" min="0" max="100" value="${taxPct}" oninput="updateTax(this.value)"><span class="adj-label">%</span></div>
          <div class="totals-block"><div class="totals-row"><span>Subtotal</span><span class="val">${fmt(tot.sub)}</span></div><div class="totals-row"><span>VAT (${taxPct}%)</span><span class="val">${fmt(tot.tax)}</span></div></div>
          <div class="grand-total-row"><span class="label">GRAND TOTAL</span><span class="val">${fmt(tot.grand)}</span></div>
        </div></div>
        <div class="section-card"><div class="section-header"><span class="section-dot"></span><span class="section-title">Notes & Terms</span></div><div class="form-body">
          <div class="field"><label>Notes</label><textarea rows="2" oninput="updateField('notes',this.value)">${formData.notes}</textarea></div>
          <div class="field"><label>Terms</label><textarea rows="2" oninput="updateField('terms',this.value)">${formData.terms}</textarea></div>
        </div></div>
        <div class="section-card"><div class="form-body actions">
          <button class="btn-whatsapp" onclick="shareToWhatsApp()">📤 SHARE TO WHATSAPP (PDF)</button>
          <button class="btn-download" onclick="downloadPDF()">⬇ DOWNLOAD PDF</button>
        </div></div>`;
    }

    function switchTab(tab, el){
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        const prefixes = { FEE_NOTE:'FBN-', INVOICE:'INV-', RECEIPT:'RCT-' };
        const suffixes = { FEE_NOTE:'2024-001', INVOICE:'2024-089', RECEIPT:'2024-089' };
        formData.invoiceNo = prefixes[tab] + suffixes[tab];
        document.getElementById('docNumber').textContent = formData.invoiceNo;
        render();
    }

    // ─── INIT ──────────────────────────────────────────────────
    window.switchTab = switchTab;
    window.addItem = addItem;
    window.removeItem = removeItem;
    window.updateItem = updateItem;
    window.updateDiscount = updateDiscount;
    window.updateTax = updateTax;
    window.updateField = updateField;
    window.shareToWhatsApp = shareToWhatsApp;
    window.downloadPDF = downloadPDF;
    window.handleFloatingShare = handleFloatingShare;
    render();
</script>
</body>
</html>

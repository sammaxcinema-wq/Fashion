<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mauncho Law Advocates — Legal Practice Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #d4b96a;
            --gold-dark: #8b6914;
            --gold-bg: #fdf8ed;
            --white: #ffffff;
            --off-white: #fafaf9;
            --black: #000000;
            --near-black: #111111;
            --border: #e0e0e0;
            --border-light: #f0f0f0;
            --text: #2c2c2c;
            --muted: #6b5e4a;
            --whatsapp: #25D366;
            --whatsapp-dark: #128C7E;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #ffffff;
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 100px;
            -webkit-font-smoothing: antialiased;
        }
        .app-header {
            background: #000000;
            padding: 14px 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border-bottom: 2px solid var(--gold);
        }
        .logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .logo-icon {
            width: 52px; height: 52px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; flex-shrink: 0; background: #ffffff;
            border: 2px solid var(--gold); padding: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .logo-icon img { width: 100%; height: 100%; object-fit: contain; border-radius: 4px; }
        .logo-text { flex: 1; }
        .logo-text .brand {
            font-family: 'Playfair Display', serif; font-weight: 800;
            font-size: 18px; color: #ffffff; letter-spacing: 1.5px; line-height: 1.1;
        }
        .logo-text .brand-sub {
            font-family: 'Rajdhani', sans-serif; font-weight: 700;
            font-size: 11px; color: var(--gold); letter-spacing: 3px; text-transform: uppercase;
        }
        .logo-text .tagline {
            font-size: 8px; color: #a09070; letter-spacing: 2px;
            text-transform: uppercase; font-weight: 500;
        }
        .doc-number {
            background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.4);
            border-radius: 6px; padding: 5px 12px; font-size: 11px;
            color: var(--gold); font-weight: 700; letter-spacing: 1.5px;
            font-family: 'Rajdhani', sans-serif;
        }
        .main-tabs { display: flex; gap: 4px; }
        .main-tab {
            flex: 1; padding: 11px 8px; text-align: center;
            font-family: 'Rajdhani', sans-serif; font-weight: 700;
            font-size: 10px; letter-spacing: 1.5px; color: #999999;
            background: none; border: none; cursor: pointer;
            border-bottom: 3px solid transparent; transition: all 0.25s;
            border-radius: 6px 6px 0 0; text-transform: uppercase;
        }
        .main-tab.active {
            color: #ffffff; background: rgba(255,255,255,0.08);
            border-bottom: 3px solid var(--gold);
        }
        .main-tab:hover:not(.active) { color: var(--gold-light); }
        .content { padding: 16px; max-width: 700px; margin: 0 auto; }
        .section-card {
            background: var(--white); border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 14px;
            overflow: hidden; border: 1px solid var(--border);
        }
        .section-header {
            display: flex; align-items: center; gap: 10px;
            padding: 13px 16px; background: #fafaf9; border-bottom: 1px solid var(--border);
        }
        .section-dot { width: 8px; height: 8px; border-radius: 2px; background: var(--gold); }
        .section-title {
            font-family: 'Rajdhani', sans-serif; font-weight: 700;
            font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--near-black);
        }
        .form-body { padding: 14px 16px; }
        .field-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .field-row .field { flex: 1; }
        .field { margin-bottom: 10px; }
        .field label {
            display: block; font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1.2px;
            color: var(--muted); margin-bottom: 4px; font-family: 'Rajdhani', sans-serif;
        }
        .field input, .field select, .field textarea {
            width: 100%; padding: 9px 11px; border: 1.5px solid var(--border);
            border-radius: 8px; font-family: 'DM Sans', sans-serif;
            font-size: 13px; color: var(--text); background: #ffffff;
            transition: all 0.2s; outline: none;
        }
        .field input:focus, .field select:focus, .field textarea:focus {
            border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
        }
        .field textarea { resize: vertical; line-height: 1.5; min-height: 60px; }
        .items-table-wrap { overflow-x: auto; padding: 0 0 4px; }
        .items-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 700px; }
        .items-table thead tr { background: #fafaf9; }
        .items-table th {
            padding: 9px 6px; text-align: left; font-family: 'Rajdhani', sans-serif;
            font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
            text-transform: uppercase; color: var(--muted);
            border-bottom: 2px solid var(--border); white-space: nowrap;
        }
        .items-table th.center, .items-table td.center { text-align: center; }
        .items-table th.right, .items-table td.right { text-align: right; }
        .items-table tbody tr { border-bottom: 1px solid var(--border-light); }
        .items-table td { padding: 6px 6px; vertical-align: middle; }
        .items-table td input {
            width: 100%; border: 1px solid transparent; border-radius: 5px;
            padding: 4px 5px; font-size: 11px; font-family: 'DM Sans', sans-serif;
            color: var(--text); background: transparent; outline: none; transition: all 0.18s;
        }
        .items-table td input:focus {
            border-color: var(--gold); background: #ffffff; box-shadow: 0 0 0 2px rgba(201,168,76,0.1);
        }
        .items-table td input.desc { min-width: 120px; }
        .items-table td input.code { width: 70px; text-align: center; font-family: 'Rajdhani', sans-serif; font-weight: 600; }
        .items-table td input.hours { width: 48px; text-align: center; }
        .items-table td input.rate { text-align: right; width: 68px; }
        .row-total { font-weight: 700; color: var(--near-black); font-size: 12px; white-space: nowrap; }
        .del-btn {
            background: none; border: none; cursor: pointer; padding: 3px 6px;
            color: #b91c1c; font-size: 20px; border-radius: 5px; transition: all 0.15s; line-height: 1;
        }
        .del-btn:hover { background: #fef2f2; }
        .add-row-btn {
            display: flex; align-items: center; gap: 6px; margin: 10px 0 0;
            padding: 8px 12px; background: none; border: 1.5px dashed var(--gold);
            border-radius: 8px; color: var(--gold-dark);
            font-family: 'DM Sans', sans-serif; font-size: 12px;
            font-weight: 600; cursor: pointer; width: 100%; transition: all 0.2s;
        }
        .add-row-btn:hover { background: var(--gold-bg); }
        .totals-block { margin-top: 14px; }
        .totals-row {
            display: flex; justify-content: space-between; padding: 6px 0;
            font-size: 13px; color: var(--muted); border-bottom: 1px solid var(--border-light);
        }
        .totals-row .val { font-weight: 700; color: var(--text); }
        .grand-total-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 10px; padding: 13px 14px; background: #000000; border-radius: 10px;
        }
        .grand-total-row .label {
            font-family: 'Rajdhani', sans-serif; font-size: 14px;
            font-weight: 700; letter-spacing: 2px; color: #cccccc; text-transform: uppercase;
        }
        .grand-total-row .val {
            font-family: 'Rajdhani', sans-serif; font-size: 20px;
            font-weight: 700; color: var(--gold);
        }
        .adj-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .adj-row label { font-size: 12px; color: var(--muted); min-width: 70px; font-weight: 500; }
        .adj-row input {
            width: 65px; padding: 5px 7px; border: 1.5px solid var(--border);
            border-radius: 6px; font-size: 12px; text-align: right; outline: none; transition: border-color 0.2s;
        }
        .adj-row input:focus { border-color: var(--gold); }
        .adj-row .adj-label { font-size: 11px; color: var(--muted); }
        .divider { height: 1px; background: var(--border); margin: 12px 0; }
        .actions { padding: 4px 0; display: flex; flex-direction: column; gap: 10px; }
        .btn-whatsapp, .btn-download {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; border: none; border-radius: 10px;
            font-family: 'Rajdhani', sans-serif; font-weight: 700;
            letter-spacing: 2px; cursor: pointer; transition: all 0.25s;
            color: #ffffff; padding: 14px; font-size: 14px;
        }
        .btn-whatsapp { background: var(--whatsapp); border: 2px solid var(--whatsapp); }
        .btn-whatsapp:hover { background: var(--whatsapp-dark); border-color: var(--whatsapp-dark); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37,211,102,0.3); }
        .btn-download { background: #000000; }
        .btn-download:hover { background: var(--near-black); transform: translateY(-2px); }
        .firm-info-bar {
            background: #fafaf9; border: 1px solid var(--border);
            border-radius: 8px; padding: 10px 14px; margin-bottom: 14px;
            font-size: 10px; color: var(--muted);
            display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 8px;
        }
        .toast {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            background: #000000; color: #ffffff; padding: 10px 22px;
            border-radius: 10px; font-size: 13px; font-weight: 500;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3); z-index: 9999;
            border-left: 4px solid var(--gold);
            animation: toastIn 0.3s ease; white-space: nowrap;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 14px;
        }
        .loading-overlay .spinner {
            width: 44px; height: 44px; border: 4px solid rgba(255,255,255,0.3);
            border-top-color: var(--gold); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-overlay .text {
            color: #ffffff; font-family: 'Rajdhani', sans-serif;
            font-weight: 700; letter-spacing: 2.5px; font-size: 14px;
        }
        .hidden { display: none !important; }
        .float-whatsapp { position: fixed; bottom: 22px; right: 16px; z-index: 999; }
        .float-btn {
            width: 58px; height: 58px; border-radius: 50%;
            background: var(--whatsapp); border: 2px solid #ffffff;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 20px rgba(37,211,102,0.4); transition: transform 0.2s;
        }
        .float-btn:hover { transform: scale(1.08); }
        .float-btn svg { width: 28px; height: 28px; fill: #ffffff; }
        .sub-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
        .sub-tab {
            flex: 1; padding: 10px; font-family: 'Rajdhani', sans-serif;
            font-weight: 700; letter-spacing: 1.5px; border: none;
            cursor: pointer; border-radius: 8px; font-size: 11px; transition: all 0.2s;
        }
        .sub-tab.active { background: #000000; color: var(--gold); }
        .sub-tab:not(.active) { background: #f0f0f0; color: #666666; }
    </style>
</head>
<body>

<header class="app-header">
    <div class="logo-row">
        <div class="logo-icon">
            <img src="https://i.ibb.co/mCPRGMdP/IMG-20260506-WA0258.jpg" alt="Mauncho Law Logo" crossorigin="anonymous">
        </div>
        <div class="logo-text">
            <div class="brand">MAUNCHO LAW</div>
            <div class="brand-sub">ADVOCATES</div>
            <div class="tagline">Laipha House • Third Floor, Nanyuki</div>
        </div>
        <div class="doc-number" id="docNumber">INV-2024-089</div>
    </div>
    <div class="main-tabs">
        <button class="main-tab active" onclick="switchMainTab('BILLING', this)">💼 Billing</button>
        <button class="main-tab" onclick="switchMainTab('MATTERS', this)">📋 Matters</button>
    </div>
</header>

<div class="toast" id="toast" style="display:none"></div>
<div class="loading-overlay hidden" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="text">GENERATING PDF…</div>
</div>

<div class="content" id="mainContent"></div>
<div id="pdfTemplate" style="position:absolute;left:-9999px;top:0;width:680px;pointer-events:none;"></div>

<div class="float-whatsapp">
    <button class="float-btn" onclick="quickShare()" aria-label="Quick Share">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347"/></svg>
    </button>
</div>

<script>
    // ─── LIBRARIES ────────────────────────────────────────────
    let libsReady = false;
    function loadLibs() {
        return new Promise((resolve, reject) => {
            if (libsReady || (window.html2canvas && window.jspdf)) { libsReady = true; return resolve(); }
            const s1 = document.createElement('script');
            s1.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
            s1.onload = () => {
                const s2 = document.createElement('script');
                s2.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                s2.onload = () => { libsReady = true; resolve(); };
                s2.onerror = reject;
                document.head.appendChild(s2);
            };
            s1.onerror = reject;
            document.head.appendChild(s1);
        });
    }

    // ─── STATE ─────────────────────────────────────────────────
    const FIRM = {
        name: 'MAUNCHO LAW ADVOCATES',
        address: 'Laipha House, Third Floor, Nanyuki',
        email: 'wakilimauncho@gmail.com',
        phone: '+254 746 389 218',
        logo: 'https://i.ibb.co/mCPRGMdP/IMG-20260506-WA0258.jpg',
        watermark: 'https://i.ibb.co/Kz6kgz9T/file-00000000d254722f993c63521e7dc065.png'
    };

    let mainTab = 'BILLING';
    let billTab = 'INVOICE';
    let items = [
        { id:1, code:'ADV-001', desc:'Legal Consultation & Advisory on Land Matter', hrs:3.5, rate:12000, disb:0 },
        { id:2, code:'DRF-042', desc:'Drafting & Filing Plaint (ELC Case No. 45/2024)', hrs:8, rate:10000, disb:3500 },
        { id:3, code:'CRT-017', desc:'Court Attendance (Nanyuki Law Courts)', hrs:2, rate:15000, disb:1500 },
        { id:4, code:'SRV-003', desc:'Service of Process & Court Summons', hrs:0, rate:0, disb:5000 }
    ];
    let nid = 5;
    let disc = 0, vat = 16;
    let doc = {
        no:'INV-2024-089', date:new Date().toISOString().slice(0,10),
        due:'Within 30 Days', ref:'ELC Case No. 45/2024',
        client:{ name:'James Mwangi', phone:'+254 722 890123', email:'j.mwangi@corporation.co.ke', addr:'Nanyuki Town' },
        notes:'Professional fees as per Advocates Remuneration Order.',
        terms:'Payment within 30 days. Interest at 14% p.a. on overdue amounts.'
    };
    let matters = [
        { id:101, title:'Mention - ELC Case 45/2024', court:'Nanyuki Law Courts', date:'2026-05-08', time:'9:00 AM', judge:'Hon. Justice Mwangi', caseNo:'ELC 45/2024', client:'James Mwangi' },
        { id:102, title:'Hearing - Succession Cause 12/2024', court:'Nanyuki Law Courts', date:'2026-05-12', time:'10:30 AM', judge:'Hon. Justice Wanjiku', caseNo:'SUC 12/2024', client:'Peter Njoroge' },
        { id:103, title:'Ruling - Civil Appeal 08/2024', court:'Nanyuki High Court', date:'2026-05-15', time:'2:15 PM', judge:'Hon. Justice Kamau', caseNo:'CVA 08/2024', client:'Grace Wambui' }
    ];
    let nmid = 106;

    function F(n){ return 'KSH '+Number(n).toLocaleString('en-KE',{minimumFractionDigits:2,maximumFractionDigits:2}); }
    function FP(n){ return Number(n).toLocaleString('en-KE',{minimumFractionDigits:2,maximumFractionDigits:2}); }
    function calc(){
        const f = items.reduce((s,i)=>s+(i.hrs*i.rate),0);
        const d = items.reduce((s,i)=>s+(i.disb||0),0);
        const s = f+d, di = s*(disc/100), ad = s-di, tx = ad*(vat/100), gt = ad+tx;
        return {f,d,s,di,ad,tx,gt};
    }
    function toast(m,d=2500){
        const t=document.getElementById('toast');t.textContent=m;t.style.display='block';
        clearTimeout(window._tt);window._tt=setTimeout(()=>{t.style.display='none';},d);
    }

    // ─── COMPACT PDF TEMPLATE ─────────────────────────────────
    function pdfTemplate() {
        const c = calc();
        const rows = items.map(i=>`
            <tr>
                <td style="padding:7px 10px;border-bottom:1px solid #ddd;font-size:10px;">${i.code||'—'}</td>
                <td style="padding:7px 10px;border-bottom:1px solid #ddd;font-size:10px;">${i.desc||'—'}</td>
                <td style="text-align:center;padding:7px 6px;border-bottom:1px solid #ddd;font-size:10px;">${i.hrs||0}</td>
                <td style="text-align:right;padding:7px 6px;border-bottom:1px solid #ddd;font-size:10px;">${FP(i.rate)}</td>
                <td style="text-align:right;padding:7px 6px;border-bottom:1px solid #ddd;font-size:10px;">${FP(i.disb||0)}</td>
                <td style="text-align:right;padding:7px 10px;border-bottom:1px solid #ddd;font-weight:700;font-size:10px;">${FP(i.hrs*i.rate+(i.disb||0))}</td>
            </tr>`).join('');

        return `<div style="width:680px;min-height:900px;background:#fdfcf9;padding:40px 45px;font-family:'Inter',sans-serif;color:#1a1a1a;position:relative;overflow:hidden;">
            <!-- Gold gradient top bar -->
            <div style="position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#8b6914,#c9a84c,#d4b96a,#8b6914);z-index:2;"></div>
            <!-- Gold gradient left bar -->
            <div style="position:absolute;top:0;left:0;bottom:0;width:5px;background:linear-gradient(180deg,#8b6914,#c9a84c,#d4b96a,#8b6914);z-index:2;"></div>
            <!-- Watermark -->
            <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:0;">
                <img src="${FIRM.watermark}" style="width:340px;height:340px;object-fit:contain;opacity:0.04;" crossorigin="anonymous">
            </div>
            <!-- Content -->
            <div style="position:relative;z-index:1;">
                <!-- Header -->
                <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;padding-bottom:16px;border-bottom:2px solid #c9a84c;">
                    <div style="display:flex;align-items:center;gap:12px;">
                        <img src="${FIRM.logo}" style="width:46px;height:46px;object-fit:contain;border-radius:5px;border:2px solid #c9a84c;" crossorigin="anonymous">
                        <div>
                            <div style="font-family:'Playfair Display',serif;font-weight:800;font-size:18px;letter-spacing:1px;">MAUNCHO LAW</div>
                            <div style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:9px;color:#8b6914;letter-spacing:2px;">ADVOCATES</div>
                        </div>
                    </div>
                    <div style="text-align:right;font-size:8px;color:#6b5e4a;line-height:1.4;">${FIRM.address}<br>${FIRM.phone} • ${FIRM.email}</div>
                </div>
                <!-- Title -->
                <div style="text-align:center;margin-bottom:24px;">
                    <h1 style="font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:900;letter-spacing:3px;text-transform:uppercase;margin:0;">TAX INVOICE</h1>
                    <div style="width:50px;height:2px;background:#c9a84c;margin:6px auto 0;"></div>
                </div>
                <!-- Bill To / Details -->
                <div style="display:flex;justify-content:space-between;margin-bottom:24px;">
                    <div>
                        <div style="font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;color:#8b6914;text-transform:uppercase;margin-bottom:4px;">BILL TO:</div>
                        <div style="font-size:14px;font-weight:700;">${doc.client.name}</div>
                        <div style="font-size:10px;color:#4a4a4a;">${doc.ref}</div>
                        <div style="font-size:9px;color:#6b5e4a;">${doc.client.addr}</div>
                    </div>
                    <div style="text-align:right;font-size:9px;color:#4a4a4a;line-height:1.6;">
                        <div><strong>Invoice No:</strong> ${doc.no}</div>
                        <div><strong>Date:</strong> ${doc.date}</div>
                        <div><strong>Due:</strong> ${doc.due}</div>
                    </div>
                </div>
                <!-- Table -->
                <table style="width:100%;border-collapse:collapse;margin-bottom:20px;">
                    <thead>
                        <tr style="background:#f5f0e8;">
                            <th style="padding:7px 10px;text-align:left;font-family:'Rajdhani',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;color:#6b5e4a;text-transform:uppercase;border-bottom:2px solid #c9a84c;">Code</th>
                            <th style="padding:7px 10px;text-align:left;font-family:'Rajdhani',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;color:#6b5e4a;text-transform:uppercase;border-bottom:2px solid #c9a84c;">Description</th>
                            <th style="padding:7px 6px;text-align:center;font-family:'Rajdhani',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;color:#6b5e4a;text-transform:uppercase;border-bottom:2px solid #c9a84c;">Hrs</th>
                            <th style="padding:7px 6px;text-align:right;font-family:'Rajdhani',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;color:#6b5e4a;text-transform:uppercase;border-bottom:2px solid #c9a84c;">Rate</th>
                            <th style="padding:7px 6px;text-align:right;font-family:'Rajdhani',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;color:#6b5e4a;text-transform:uppercase;border-bottom:2px solid #c9a84c;">Disb.</th>
                            <th style="padding:7px 10px;text-align:right;font-family:'Rajdhani',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;color:#6b5e4a;text-transform:uppercase;border-bottom:2px solid #c9a84c;">Total</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
                <!-- Totals -->
                <div style="display:flex;justify-content:flex-end;">
                    <div style="width:240px;border-top:2px solid #c9a84c;padding-top:12px;">
                        <div style="display:flex;justify-content:space-between;padding:3px 0;font-size:10px;color:#4a4a4a;"><span>Subtotal</span><span style="font-weight:600;">KSH ${FP(c.s)}</span></div>
                        <div style="display:flex;justify-content:space-between;padding:3px 0;font-size:10px;color:#4a4a4a;"><span>VAT (${vat}%)</span><span style="font-weight:600;">KSH ${FP(c.tx)}</span></div>
                        <div style="display:flex;justify-content:space-between;padding:8px 0;margin-top:4px;border-top:2px solid #1a1a1a;font-weight:900;font-size:12px;">
                            <span style="font-family:'Rajdhani',sans-serif;letter-spacing:1.5px;">GRAND TOTAL</span>
                            <span>KSH ${FP(c.gt)}</span>
                        </div>
                    </div>
                </div>
                <!-- Footer -->
                <div style="margin-top:35px;padding-top:10px;border-top:1px solid #e8e0d0;text-align:center;font-size:7px;color:#8b8b8b;">
                    ${FIRM.name} • ${FIRM.address} • ${FIRM.phone} • ${FIRM.email}
                </div>
            </div>
        </div>`;
    }

    // ─── OPTIMIZED PDF GENERATION ─────────────────────────────
    async function makePDF() {
        await loadLibs();
        const el = document.getElementById('pdfTemplate');
        el.innerHTML = pdfTemplate();
        await new Promise(r=>setTimeout(r,500));
        const canvas = await html2canvas(el,{
            scale:1.7, useCORS:true, backgroundColor:'#fdfcf9', logging:false,
            width:el.scrollWidth, height:el.scrollHeight, imageTimeout:0,
            allowTaint:false
        });
        const {jsPDF} = window.jspdf;
        const img = canvas.toDataURL('image/jpeg',0.9);
        const pw=210, ph=(canvas.height*pw)/canvas.width;
        const pdf = new jsPDF('p','mm','a4');
        pdf.addImage(img,'JPEG',0,0,pw,Math.min(ph,297));
        if(ph>297){let rem=ph-297;while(rem>0){pdf.addPage();pdf.addImage(img,'JPEG',0,-(297*(pdf.getNumberOfPages()-1)),pw,ph);rem-=297;}}
        el.innerHTML = '';
        return pdf.output('blob');
    }

    // ─── SHARE & DOWNLOAD ─────────────────────────────────────
    async function shareWA(){
        const lo=document.getElementById('loadingOverlay');lo.classList.remove('hidden');
        toast('📄 Generating PDF…',4000);
        try{
            const blob=await makePDF();
            const fn=`Mauncho_Law_${billTab}_${doc.no.replace(/[/#]/g,'_')}.pdf`;
            const file=new File([blob],fn,{type:'application/pdf'});
            const c=calc();
            const msg=`*${FIRM.name}*\n⚖️ ${FIRM.address}\n📄 ${billTab.replace('_',' ')}: ${doc.no}\n👤 ${doc.client.name}\n📋 ${doc.ref}\n💰 ${F(c.gt)}\n📅 ${doc.date}`;
            if(navigator.canShare&&navigator.canShare({files:[file]})){
                await navigator.share({title:`Mauncho Law — ${doc.no}`,text:msg,files:[file]});
                toast('✅ Shared!',3000);
            }else{
                const u=URL.createObjectURL(blob);const a=document.createElement('a');
                a.href=u;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);
                setTimeout(()=>{window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');URL.revokeObjectURL(u);},500);
                toast('📥 Downloaded! Opening WhatsApp…',4000);
            }
        }catch(e){console.error(e);toast('⚠️ Error. Retrying…',3000);}
        finally{lo.classList.add('hidden');}
    }

    async function dlPDF(){
        const lo=document.getElementById('loadingOverlay');lo.classList.remove('hidden');
        toast('📄 Preparing PDF…',3000);
        try{
            const blob=await makePDF();
            const fn=`Mauncho_Law_${billTab}_${doc.no.replace(/[/#]/g,'_')}.pdf`;
            const u=URL.createObjectURL(blob);const a=document.createElement('a');
            a.href=u;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);
            URL.revokeObjectURL(u);toast('✅ Downloaded!',2500);
        }catch(e){console.error(e);toast('⚠️ Failed.',3000);}
        finally{lo.classList.add('hidden');}
    }

    function quickShare(){
        if(mainTab!=='BILLING'){mainTab='BILLING';document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active'));document.querySelector('.main-tab:first-child').classList.add('active');}
        render();setTimeout(()=>shareWA(),300);
    }

    // ─── MATTERS ──────────────────────────────────────────────
    function addMatter(){
        const t=prompt('Title:');if(!t)return;
        const d=prompt('Date (YYYY-MM-DD):',new Date().toISOString().slice(0,10));if(!d)return;
        const ti=prompt('Time:','9:00 AM');const c=prompt('Court:','Nanyuki Law Courts');
        const cn=prompt('Case No:');const cl=prompt('Client:');const j=prompt('Judge:');
        matters.push({id:nmid++,title:t,date:d,time:ti||'9:00 AM',court:c||'Nanyuki Law Courts',caseNo:cn||'',client:cl||'',judge:j||''});
        render();toast('✅ Matter added!',2000);
    }
    function editMatter(id){
        const m=matters.find(x=>x.id===id);if(!m)return;
        const t=prompt('Title:',m.title);if(t===null)return;
        const d=prompt('Date:',m.date);if(d===null)return;
        Object.assign(m,{title:t||m.title,date:d||m.date,time:prompt('Time:',m.time)||m.time,court:prompt('Court:',m.court)||m.court,caseNo:prompt('Case No:',m.caseNo)||m.caseNo,client:prompt('Client:',m.client)||m.client,judge:prompt('Judge:',m.judge)||m.judge});
        render();toast('✅ Updated!',2000);
    }
    function delMatter(id){if(confirm('Delete?')){matters=matters.filter(x=>x.id!==id);render();toast('🗑️ Deleted',2000);}}

    // ─── ITEMS ────────────────────────────────────────────────
    function addItem(){items.push({id:nid++,code:'',desc:'',hrs:0,rate:0,disb:0});render();}
    function delItem(id){if(items.length<=1){toast('⚠️ Need at least 1 item');return;}items=items.filter(i=>i.id!==id);render();}
    function updItem(id,f,v){const i=items.find(x=>x.id===id);if(!i)return;if(f==='hrs'||f==='rate'||f==='disb')i[f]=parseFloat(v)||0;else i[f]=v;render();}

    // ─── RENDER ───────────────────────────────────────────────
    function renderBilling(){
        const c=calc();
        const tabs=['FEE_NOTE','INVOICE','RECEIPT'];
        return `<div class="firm-info-bar"><span>📍 ${FIRM.address}</span><span>📧 ${FIRM.email}</span><span>📞 ${FIRM.phone}</span></div>
        <div class="sub-tabs">${tabs.map(t=>`<button class="sub-tab${billTab===t?' active':''}" onclick="switchBillTab('${t}')">${t.replace('_',' ')}</button>`).join('')}</div>
        <div class="section-card"><div class="section-header"><span class="section-dot"></span><span class="section-title">${billTab.replace('_',' ')} Details</span></div><div class="form-body">
          <div class="field-row"><div class="field"><label>Number</label><input value="${doc.no}" oninput="updDoc('no',this.value)"></div><div class="field"><label>Date</label><input type="date" value="${doc.date}" oninput="updDoc('date',this.value)"></div></div>
          <div class="field-row"><div class="field"><label>Matter Ref</label><input value="${doc.ref}" oninput="updDoc('ref',this.value)"></div><div class="field"><label>Due Date</label><input value="${doc.due}" oninput="updDoc('due',this.value)"></div></div>
        </div></div>
        <div class="section-card"><div class="section-header"><span class="section-dot"></span><span class="section-title">Client</span></div><div class="form-body">
          <div class="field"><label>Name</label><input value="${doc.client.name}" oninput="updClient('name',this.value)"></div>
          <div class="field-row"><div class="field"><label>Phone</label><input value="${doc.client.phone}" oninput="updClient('phone',this.value)"></div><div class="field"><label>Email</label><input value="${doc.client.email}" oninput="updClient('email',this.value)"></div></div>
          <div class="field"><label>Address</label><input value="${doc.client.addr}" oninput="updClient('addr',this.value)"></div>
        </div></div>
        <div class="section-card"><div class="section-header"><span class="section-dot"></span><span class="section-title">Services</span></div>
          <div class="items-table-wrap"><table class="items-table"><thead><tr><th>Code</th><th>Description</th><th class="center">Hrs</th><th class="right">Rate</th><th class="right">Disb.</th><th class="right">Total</th><th></th></tr></thead><tbody>
            ${items.map(i=>`<tr><td><input class="code" value="${i.code||''}" oninput="updItem(${i.id},'code',this.value)"></td><td><input class="desc" value="${i.desc}" oninput="updItem(${i.id},'desc',this.value)"></td><td class="center"><input class="hours" type="number" min="0" step="0.5" value="${i.hrs}" oninput="updItem(${i.id},'hrs',this.value)"></td><td class="right"><input class="rate" type="number" min="0" step="500" value="${i.rate}" oninput="updItem(${i.id},'rate',this.value)"></td><td class="right"><input class="rate" type="number" min="0" step="100" value="${i.disb||0}" oninput="updItem(${i.id},'disb',this.value)"></td><td class="right"><span class="row-total">${F(i.hrs*i.rate+(i.disb||0))}</span></td><td><button class="del-btn" onclick="delItem(${i.id})">×</button></td></tr>`).join('')}
          </tbody></table></div>
          <div style="padding:4px 16px 16px"><button class="add-row-btn" onclick="addItem()">+ Add Service</button>
          <div class="divider"></div>
          <div class="adj-row"><label>Discount</label><input type="number" min="0" max="100" value="${disc}" oninput="updDisc(this.value)"><span class="adj-label">%</span></div>
          <div class="adj-row"><label>VAT</label><input type="number" min="0" max="100" value="${vat}" oninput="updVat(this.value)"><span class="adj-label">%</span></div>
          <div class="totals-block"><div class="totals-row"><span>Subtotal</span><span class="val">${F(c.s)}</span></div><div class="totals-row"><span>VAT (${vat}%)</span><span class="val">${F(c.tx)}</span></div></div>
          <div class="grand-total-row"><span class="label">GRAND TOTAL</span><span class="val">${F(c.gt)}</span></div>
        </div></div>
        <div class="section-card"><div class="section-header"><span class="section-dot"></span><span class="section-title">Notes & Terms</span></div><div class="form-body">
          <div class="field"><label>Notes</label><textarea rows="2" oninput="updDoc('notes',this.value)">${doc.notes}</textarea></div>
          <div class="field"><label>Terms</label><textarea rows="2" oninput="updDoc('terms',this.value)">${doc.terms}</textarea></div>
        </div></div>
        <div class="section-card"><div class="form-body actions">
          <button class="btn-whatsapp" onclick="shareWA()">📤 SHARE TO WHATSAPP (PDF)</button>
          <button class="btn-download" onclick="dlPDF()">⬇ DOWNLOAD PDF</button>
        </div></div>`;
    }

    function renderMatters(){
        const today=new Date().toISOString().slice(0,10);
        const sorted=[...matters].sort((a,b)=>a.date.localeCompare(b.date));
        const up=sorted.filter(m=>m.date>=today);
        const past=sorted.filter(m=>m.date<today);
        return `<div class="firm-info-bar"><span>📍 ${FIRM.address}</span><span>📧 ${FIRM.email}</span><span>📞 ${FIRM.phone}</span></div>
        <div class="section-card"><div class="section-header"><span class="section-dot"></span><span class="section-title">📅 Upcoming (${up.length})</span></div><div class="form-body">
          ${up.length===0?'<p style="text-align:center;color:var(--muted);padding:20px;">None scheduled.</p>':up.map(m=>{
            const md=new Date(m.date+'T00:00:00');
            const isToday=m.date===today;
            const tom=new Date();tom.setDate(tom.getDate()+1);
            const isTom=m.date===tom.toISOString().slice(0,10);
            return `<div style="background:#fafaf9;border-left:3px solid var(--gold);padding:10px;margin-bottom:8px;border-radius:6px;">
              <div style="display:flex;justify-content:space-between;align-items:start;"><div style="flex:1;"><strong style="font-size:13px;">${m.title}</strong>${isToday?' <span style="background:#fef9f0;color:#8b6914;padding:1px 6px;border-radius:8px;font-size:8px;font-weight:700;">TODAY</span>':''}${isTom?' <span style="background:#fef9f0;color:#8b6914;padding:1px 6px;border-radius:8px;font-size:8px;font-weight:700;">TOMORROW</span>':''}</div>
              <div style="display:flex;gap:4px;"><button onclick="editMatter(${m.id})" style="background:#f0f0f0;border:none;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:9px;font-weight:700;">✏️</button><button onclick="delMatter(${m.id})" style="background:#fde8e8;color:#8b2500;border:none;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:9px;font-weight:700;">🗑️</button></div></div>
              <div style="font-size:10px;color:#6b5e4a;margin-top:4px;">📅 ${md.toLocaleDateString('en-KE',{weekday:'long',day:'numeric',month:'long',year:'numeric'})} | 🕐 ${m.time}</div>
              <div style="font-size:10px;color:#6b5e4a;">🏛️ ${m.court} | 👨‍⚖️ ${m.judge||'TBA'} | 📁 ${m.caseNo||'N/A'}</div>
            </div>`;
          }).join('')}
        </div></div>
        ${past.length>0?`<div class="section-card"><div class="section-header"><span class="section-dot"></span><span class="section-title">📂 Past (${past.length})</span></div><div class="form-body">${past.slice(-5).reverse().map(m=>{const md=new Date(m.date+'T00:00:00');return`<div style="background:#fafaf9;border-left:3px solid #ccc;padding:8px;margin-bottom:6px;border-radius:6px;opacity:0.7;"><strong style="font-size:12px;">${m.title}</strong><div style="font-size:9px;color:#6b5e4a;">📅 ${md.toLocaleDateString('en-KE',{day:'numeric',month:'short',year:'numeric'})} | 🏛️ ${m.court}</div></div>`;}).join('')}</div></div>`:''}
        <button class="add-row-btn" onclick="addMatter()" style="margin-top:0;">📅 + Schedule New Matter</button>`;
    }

    function render(){
        document.getElementById('mainContent').innerHTML = mainTab==='BILLING' ? renderBilling() : renderMatters();
        document.getElementById('docNumber').textContent = mainTab==='BILLING' ? doc.no : 'MATTERS';
    }

    // ─── HANDLERS ─────────────────────────────────────────────
    function switchMainTab(t,el){mainTab=t;document.querySelectorAll('.main-tab').forEach(x=>x.classList.remove('active'));el.classList.add('active');render();}
    function switchBillTab(t){billTab=t;const p={FEE_NOTE:'FBN-',INVOICE:'INV-',RECEIPT:'RCT-'};const s={FEE_NOTE:'2024-001',INVOICE:'2024-089',RECEIPT:'2024-089'};doc.no=p[t]+s[t];render();}
    function updDoc(f,v){doc[f]=v;if(f==='no')document.getElementById('docNumber').textContent=v;render();}
    function updClient(f,v){doc.client[f]=v;render();}
    function updDisc(v){disc=parseFloat(v)||0;render();}
    function updVat(v){vat=parseFloat(v)||0;render();}

    // ─── INIT ─────────────────────────────────────────────────
    window.switchMainTab=switchMainTab;window.switchBillTab=switchBillTab;
    window.updDoc=updDoc;window.updClient=updClient;window.updDisc=updDisc;window.updVat=updVat;
    window.addItem=addItem;window.delItem=delItem;window.updItem=updItem;
    window.shareWA=shareWA;window.dlPDF=dlPDF;window.quickShare=quickShare;
    window.addMatter=addMatter;window.editMatter=editMatter;window.delMatter=delMatter;
    loadLibs().catch(()=>{});
    render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mauncho Law Advocates — Legal Practice Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #d4b96a;
            --gold-dark: #8b6914;
            --gold-bg: #fdf8ed;
            --white: #ffffff;
            --off-white: #fafaf9;
            --black: #000000;
            --near-black: #111111;
            --dark-gray: #1a1a1a;
            --charcoal: #2c2c2c;
            --border: #e0e0e0;
            --border-light: #f0f0f0;
            --text: #2c2c2c;
            --muted: #6b5e4a;
            --success: #2d5016;
            --danger: #8b2500;
            --whatsapp: #25D366;
            --whatsapp-dark: #128C7E;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: #ffffff;
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 100px;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Header Styles */
        .app-header {
            background: #000000;
            padding: 14px 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border-bottom: 2px solid var(--gold);
        }
        
        .logo-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }
        
        .logo-icon {
            width: 52px;
            height: 52px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            background: #ffffff;
            border: 2px solid var(--gold);
            padding: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 4px;
        }
        
        .logo-text {
            flex: 1;
        }
        
        .logo-text .brand {
            font-family: 'Playfair Display', serif;
            font-weight: 800;
            font-size: 18px;
            color: #ffffff;
            letter-spacing: 1.5px;
            line-height: 1.1;
        }
        
        .logo-text .brand-sub {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 11px;
            color: var(--gold);
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        .logo-text .tagline {
            font-size: 8px;
            color: #a09070;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }
        
        .doc-number {
            background: rgba(201, 168, 76, 0.15);
            border: 1px solid rgba(201, 168, 76, 0.4);
            border-radius: 6px;
            padding: 5px 12px;
            font-size: 11px;
            color: var(--gold);
            font-weight: 700;
            letter-spacing: 1.5px;
            font-family: 'Rajdhani', sans-serif;
        }
        
        /* Tab Navigation */
        .main-tabs {
            display: flex;
            gap: 4px;
        }
        
        .main-tab {
            flex: 1;
            padding: 11px 8px;
            text-align: center;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 10px;
            letter-spacing: 1.5px;
            color: #999999;
            background: none;
            border: none;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.25s;
            border-radius: 6px 6px 0 0;
            text-transform: uppercase;
        }
        
        .main-tab.active {
            color: #ffffff;
            background: rgba(255,255,255,0.08);
            border-bottom: 3px solid var(--gold);
        }
        
        .main-tab:hover:not(.active) {
            color: var(--gold-light);
        }
        
        /* Content Area */
        .content {
            padding: 16px;
            max-width: 700px;
            margin: 0 auto;
        }
        
        /* Card Styles */
        .section-card {
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: box-shadow 0.2s;
        }
        
        .section-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 13px 16px;
            background: #fafaf9;
            border-bottom: 1px solid var(--border);
        }
        
        .section-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            background: var(--gold);
        }
        
        .section-title {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--near-black);
        }
        
        .form-body {
            padding: 14px 16px;
        }
        
        /* Form Elements */
        .field-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .field-row .field {
            flex: 1;
        }
        
        .field {
            margin-bottom: 10px;
        }
        
        .field label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--muted);
            margin-bottom: 4px;
            font-family: 'Rajdhani', sans-serif;
        }
        
        .field input, .field select, .field textarea {
            width: 100%;
            padding: 9px 11px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            color: var(--text);
            background: #ffffff;
            transition: all 0.2s;
            outline: none;
        }
        
        .field input:focus, .field select:focus, .field textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.15);
            background: #ffffff;
        }
        
        .field textarea {
            resize: vertical;
            line-height: 1.5;
            min-height: 60px;
        }
        
        /* Table Styles */
        .items-table-wrap {
            overflow-x: auto;
            padding: 0 0 4px;
            -webkit-overflow-scrolling: touch;
        }
        
        .items-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            min-width: 700px;
        }
        
        .items-table thead tr {
            background: #fafaf9;
        }
        
        .items-table th {
            padding: 9px 6px;
            text-align: left;
            font-family: 'Rajdhani', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }
        
        .items-table th.center, .items-table td.center {
            text-align: center;
        }
        
        .items-table th.right, .items-table td.right {
            text-align: right;
        }
        
        .items-table tbody tr {
            border-bottom: 1px solid var(--border-light);
        }
        
        .items-table td {
            padding: 6px 6px;
            vertical-align: middle;
        }
        
        .items-table td input {
            width: 100%;
            border: 1px solid transparent;
            border-radius: 5px;
            padding: 4px 5px;
            font-size: 11px;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            background: transparent;
            outline: none;
            transition: all 0.18s;
        }
        
        .items-table td input:focus {
            border-color: var(--gold);
            background: #ffffff;
            box-shadow: 0 0 0 2px rgba(201, 168, 76, 0.1);
        }
        
        .items-table td input.desc {
            min-width: 120px;
        }
        
        .items-table td input.code {
            width: 70px;
            text-align: center;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
        }
        
        .items-table td input.hours {
            width: 48px;
            text-align: center;
        }
        
        .items-table td input.rate {
            text-align: right;
            width: 68px;
        }
        
        .row-total {
            font-weight: 700;
            color: var(--near-black);
            font-size: 12px;
            white-space: nowrap;
        }
        
        .del-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 3px 6px;
            color: #b91c1c;
            font-size: 20px;
            border-radius: 5px;
            transition: all 0.15s;
            line-height: 1;
        }
        
        .del-btn:hover {
            background: #fef2f2;
        }
        
        .add-row-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 10px 0 0;
            padding: 8px 12px;
            background: none;
            border: 1.5px dashed var(--gold);
            border-radius: 8px;
            color: var(--gold-dark);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }
        
        .add-row-btn:hover {
            background: var(--gold-bg);
        }
        
        /* Totals Section */
        .totals-block {
            margin-top: 14px;
        }
        
        .totals-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
            color: var(--muted);
            border-bottom: 1px solid var(--border-light);
        }
        
        .totals-row .label {
            font-weight: 500;
        }
        
        .totals-row .val {
            font-weight: 700;
            color: var(--text);
        }
        
        .grand-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding: 13px 14px;
            background: #000000;
            border-radius: 10px;
        }
        
        .grand-total-row .label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #cccccc;
            text-transform: uppercase;
        }
        
        .grand-total-row .val {
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--gold);
        }
        
        .adj-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .adj-row label {
            font-size: 12px;
            color: var(--muted);
            min-width: 70px;
            font-weight: 500;
        }
        
        .adj-row input {
            width: 65px;
            padding: 5px 7px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
            text-align: right;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .adj-row input:focus {
            border-color: var(--gold);
        }
        
        .adj-row .adj-label {
            font-size: 11px;
            color: var(--muted);
        }
        
        .divider {
            height: 1px;
            background: var(--border);
            margin: 12px 0;
        }
        
        /* Status Pills */
        .status-pills {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        
        .status-pill {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            border: 1.5px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 1px;
            background: #fafaf9;
            color: var(--muted);
        }
        
        .status-pill.active-paid {
            background: #e6f0dc;
            border-color: #2d5016;
            color: #2d5016;
        }
        
        .status-pill.active-unpaid {
            background: #fde8e8;
            border-color: #8b2500;
            color: #8b2500;
        }
        
        /* Action Buttons */
        .actions {
            padding: 4px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .btn-whatsapp, .btn-download {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: none;
            border-radius: 10px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.25s;
            color: #ffffff;
            padding: 14px;
            font-size: 14px;
        }
        
        .btn-whatsapp {
            background: var(--whatsapp);
            border: 2px solid var(--whatsapp);
        }
        
        .btn-whatsapp:hover {
            background: var(--whatsapp-dark);
            border-color: var(--whatsapp-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.3);
        }
        
        .btn-download {
            background: #000000;
            box-shadow: 0 4px 14px rgba(0,0,0,0.2);
        }
        
        .btn-download:hover {
            background: var(--near-black);
            transform: translateY(-2px);
        }
        
        /* Firm Info Bar */
        .firm-info-bar {
            background: #fafaf9;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 14px;
            font-size: 10px;
            color: var(--muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .firm-info-bar span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* Toast Notification */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000;
            color: #ffffff;
            padding: 10px 22px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            z-index: 9999;
            border-left: 4px solid var(--gold);
            animation: toastIn 0.3s ease;
            white-space: nowrap;
        }
        
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 14px;
        }
        
        .loading-overlay .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-overlay .text {
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            letter-spacing: 2.5px;
            font-size: 14px;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* Floating WhatsApp Button */
        .float-whatsapp {
            position: fixed;
            bottom: 22px;
            right: 16px;
            z-index: 999;
        }
        
        .float-btn {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: var(--whatsapp);
            border: 2px solid #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
            transition: transform 0.2s;
        }
        
        .float-btn:hover {
            transform: scale(1.08);
        }
        
        .float-btn svg {
            width: 28px;
            height: 28px;
            fill: #ffffff;
        }
        
        /* Sub-tabs for billing */
        .sub-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
        }
        
        .sub-tab {
            flex: 1;
            padding: 10px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            letter-spacing: 1.5px;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            font-size: 11px;
            transition: all 0.2s;
        }
        
        .sub-tab.active {
            background: #000000;
            color: var(--gold);
        }
        
        .sub-tab:not(.active) {
            background: #f0f0f0;
            color: #666666;
        }
        
        /* Responsive adjustments */
        @media (max-width: 480px) {
            .logo-text .brand {
                font-size: 16px;
            }
            .content {
                padding: 12px;
            }
            .section-header {
                padding: 10px 12px;
            }
            .form-body {
                padding: 10px 12px;
            }
        }
    </style>
</head>

<header class="app-header">

<script>
    // ────────────────────────────────────────────────────────────
    // PDF LIBRARIES LOADER
    // ────────────────────────────────────────────────────────────
    let librariesReady = false;
    
    function initLibraries() {
        return new Promise((resolve, reject) => {
            if (librariesReady || (window.html2canvas && window.jspdf)) {
                librariesReady = true;
                return resolve();
            }
            
            const script1 = document.createElement('script');
            script1.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
            
            script1.onload = () => {
                const script2 = document.createElement('script');
                script2.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                
                script2.onload = () => {
                    librariesReady = true;
                    resolve();
                };
                
                script2.onerror = () => reject(new Error('Failed to load jsPDF'));
                document.head.appendChild(script2);
            };
            
            script1.onerror = () => reject(new Error('Failed to load html2canvas'));
            document.head.appendChild(script1);
        });
    }
    
    // ────────────────────────────────────────────────────────────

        { id: 2, code: 'DRF-042', description: 'Drafting & Filing Plaint (ELC Case No. 45/2024)', hours: 8.0, rate: 10000, disbursement: 3500 },
        { id: 3, code: 'CRT-017', description: 'Court Attendance (Nanyuki Law Courts)', hours: 2.0, rate: 15000, disbursement: 1500 },
        { id: 4, code: 'SRV-003', description: 'Service of Process & Court Summons', hours: 0, rate: 0, disbursement: 5000 }

    let documentInfo = {

        dueDate: 'Within 30 Days',
        matterRef: 'ELC Case No. 45/2024',
        client: {

    function formatCurrency(amount) {
        return 'KSH ' + Number(amount).toLocaleString('en-KE', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }
    
    function formatPlain(amount) {
        return Number(amount).toLocaleString('en-KE', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }
    
    function calculateTotals() {
        const feesSubtotal = lineItems.reduce((sum, item) => sum + (item.hours * item.rate), 0);
        const totalDisbursements = lineItems.reduce((sum, item) => sum + (item.disbursement || 0), 0);
        const subtotal = feesSubtotal + totalDisbursements;
        const discount = subtotal * (discountPercent / 100);
        const afterDiscount = subtotal - discount;
        const vat = afterDiscount * (vatPercent / 100);
        const grandTotal = afterDiscount + vat;
        
        return {
            feesSubtotal,
            totalDisbursements,
            subtotal,
            discount,
            afterDiscount,
            vat,
            grandTotal
        };
    }

        toast.style.display = 'block';
        clearTimeout(window._notificationTimer);
        window._notificationTimer = setTimeout(() => {
            toast.style.display = 'none';
        }, duration);
    }

    async function createPDFBlob() {
        await initLibraries();
        
        const templateHTML = generatePDFTemplate();
        const templateElement = document.getElementById('pdfTemplate');
        templateElement.innerHTML = templateHTML;
        
        // Wait for images to load
        await new Promise(resolve => setTimeout(resolve, 800));
        
        const canvas = await html2canvas(templateElement, {
            scale: 2,
            useCORS: true,
            backgroundColor: '#ffffff',
            logging: false,
            width: templateElement.scrollWidth,
            height: templateElement.scrollHeight
        });
        
        const { jsPDF } = window.jspdf;
        const imageData = canvas.toDataURL('image/png');
        const pdfWidth = 210;
        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
        const pdf = new jsPDF('p', 'mm', 'a4');
        
        pdf.addImage(imageData, 'PNG', 0, 0, pdfWidth, Math.min(pdfHeight, 297));
        
        // Handle multi-page documents
        if (pdfHeight > 297) {
            let remaining = pdfHeight - 297;
            while (remaining > 0) {
                pdf.addPage();
                pdf.addImage(imageData, 'PNG', 0, -(297 * (pdf.getNumberOfPages() - 1)), pdfWidth, pdfHeight);
                remaining -= 297;
            }
        }
        
        templateElement.innerHTML = '';
        return pdf.output('blob');
    }

    async function shareToWhatsApp() {
        const loadingOverlay = document.getElementById('loadingOverlay');
        loadingOverlay.classList.remove('hidden');
        showNotification('📄 Generating PDF for WhatsApp…', 4000);
        
        try {
            const pdfBlob = await createPDFBlob();
            const fileName = `Mauncho_Law_${currentBillingTab}_${documentInfo.number.replace(/[/#]/g,'_')}.pdf`;
            const file = new File([pdfBlob], fileName, { type: 'application/pdf' });
            const totals = calculateTotals();
            
            const messageText = `*${FIRM_INFO.name}*\n⚖️ ${FIRM_INFO.address}\n📄 ${currentBillingTab.replace('_',' ')}: ${documentInfo.number}\n👤 ${documentInfo.client.name}\n📋 ${documentInfo.matterRef}\n💰 Grand Total: ${formatCurrency(totals.grandTotal)}\n📅 ${documentInfo.date}\n📞 ${FIRM_INFO.phone}`;
            
            // Try native sharing first (mobile devices)
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({
                    title: `Mauncho Law — ${documentInfo.number}`,
                    text: messageText,
                    files: [file]
                });
                showNotification('✅ Document shared successfully!', 3000);
            } else {
                // Fallback: Download and open WhatsApp
                const downloadUrl = URL.createObjectURL(pdfBlob);
                const downloadLink = document.createElement('a');
                downloadLink.href = downloadUrl;
                downloadLink.download = fileName;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
                
                setTimeout(() => {
                    window.open(`https://wa.me/?text=${encodeURIComponent(messageText)}`, '_blank');
                    URL.revokeObjectURL(downloadUrl);
                }, 500);
                
                showNotification('📥 PDF downloaded! Opening WhatsApp…', 4000);
            }
        } catch (error) {
            console.error('Sharing error:', error);
            const totals = calculateTotals();
            const fallbackMessage = `*${FIRM_INFO.name}*\n📄 ${currentBillingTab.replace('_',' ')}: ${documentInfo.number}\n💰 Grand Total: ${formatCurrency(totals.grandTotal)}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(fallbackMessage)}`, '_blank');
        } finally {
            loadingOverlay.classList.add('hidden');
        }
    }
    
    async function downloadPDF() {
        const loadingOverlay = document.getElementById('loadingOverlay');
        loadingOverlay.classList.remove('hidden');

        try {
            const pdfBlob = await createPDFBlob();

                        <div class="field">
                            <label>Email</label>
                            <input value="${documentInfo.client.email}" 
                                   oninput="updateClientField('email', this.value)">
                        </div>
                    </div>
                    <div class="field">
                        <label>Address</label>
                        <input value="${documentInfo.client.address}" 
                               oninput="updateClientField('address', this.value)">
                    </div>
                </div>
            </div>
            
            <div class="section-card">
                <div class="section-header">
                    <span class="section-dot"></span>
                    <span class="section-title">Professional Services & Disbursements</span>
                </div>
                <div class="items-table-wrap">
                    <table class="items-table">
                        <thead>
                            <tr>
                                <th>Code</th>
                                <th>Description</th>
                                <th class="center">Hours</th>
                                <th class="right">Rate/hr</th>
                                <th class="right">Disb.</th>
                                <th class="right">Total</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            ${lineItems.map(item => `
                                <tr>
                                    <td><input class="code" value="${item.code || ''}" 
                                               oninput="updateLineItem(${item.id}, 'code', this.value)"></td>
                                    <td><input class="desc" value="${item.description}" 
                                               oninput="updateLineItem(${item.id}, 'description', this.value)"></td>
                                    <td class="center"><input class="hours" type="number" min="0" step="0.5" 
                                               value="${item.hours}" 
                                               oninput="updateLineItem(${item.id}, 'hours', this.value)"></td>
                                    <td class="right"><input class="rate" type="number" min="0" step="500" 
                                               value="${item.rate}" 
                                               oninput="updateLineItem(${item.id}, 'rate', this.value)"></td>
                                    <td class="right"><input class="rate" type="number" min="0" step="100" 
                                               value="${item.disbursement || 0}" 
                                               oninput="updateLineItem(${item.id}, 'disbursement', this.value)"></td>
                                    <td class="right"><span class="row-total">${formatCurrency(item.hours * item.rate + (item.disbursement || 0))}</span></td>
                                    <td><button class="del-btn" onclick="removeLineItem(${item.id})">×</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                <div style="padding:4px 16px 16px">
                    <button class="add-row-btn" onclick="addLineItem()">+ Add Service / Disbursement</button>
                    
                    <div class="divider"></div>
                    
                    <div class="adj-row">
                        <label>Discount</label>
                        <input type="number" min="0" max="100" value="${discountPercent}" 
                               oninput="updateDiscount(this.value)">
                        <span class="adj-label">%</span>
                    </div>
                    <div class="adj-row">
                        <label>VAT</label>
                        <input type="number" min="0" max="100" value="${vatPercent}" 
                               oninput="updateVAT(this.value)">
                        <span class="adj-label">%</span>
                    </div>
                    
                    <div class="totals-block">
                        <div class="totals-row">
                            <span>Professional Fees</span>
                            <span class="val">${formatCurrency(totals.feesSubtotal)}</span>
                        </div>
                        <div class="totals-row">
                            <span>Disbursements</span>
                            <span class="val">${formatCurrency(totals.totalDisbursements)}</span>
                        </div>
                        <div class="totals-row">
                            <span>Subtotal</span>
                            <span class="val">${formatCurrency(totals.subtotal)}</span>
                        </div>
                        ${discountPercent > 0 ? `
                            <div class="totals-row">
                                <span>Discount (${discountPercent}%)</span>
                                <span class="val">-${formatCurrency(totals.discount)}</span>
                            </div>
                        ` : ''}
                        <div class="totals-row">
                            <span>VAT (${vatPercent}%)</span>
                            <span class="val">${formatCurrency(totals.vat)}</span>
                        </div>
                    </div>
                    
                    <div class="grand-total-row">
                        <span class="label">GRAND TOTAL</span>
                        <span class="val">${formatCurrency(totals.grandTotal)}</span>
                    </div>
                </div>
            </div>
            
            <div class="section-card">
                <div class="section-header">
                    <span class="section-dot"></span>
                    <span class="section-title">Notes & Terms</span>
                </div>
                <div class="form-body">
                    <div class="field">
                        <label>Notes</label>
                        <textarea rows="2" oninput="updateDocumentField('notes', this.value)">${documentInfo.notes}</textarea>
                    </div>
                    <div class="field">
                        <label>Terms</label>
                        <textarea rows="2" oninput="updateDocumentField('terms', this.value)">${documentInfo.terms}</textarea>
                    </div>
                </div>
            </div>
            
            <div class="section-card">
                <div class="form-body actions">
                    <button class="btn-whatsapp" onclick="shareToWhatsApp()">
                        📤 SHARE TO WHATSAPP (PDF)
                    </button>
                    <button class="btn-download" onclick="downloadPDF()">
                        ⬇ DOWNLOAD PDF
                    </button>
                </div>
            </div>
        `;
    }
    
    function renderMattersView() {
        const today = new Date().toISOString().slice(0, 10);
        
        // Sort matters by date
        const sortedMatters = [...matters].sort((a, b) => a.date.localeCompare(b.date));
        
        const upcomingMatters = sortedMatters.filter(m => m.date >= today);
        const pastMatters = sortedMatters.filter(m => m.date < today);
        
        return `
            <div class="firm-info-bar">
                <span>📍 ${FIRM_INFO.address}</span>
                <span>📧 ${FIRM_INFO.email}</span>
                <span>📞 ${FIRM_INFO.phone}</span>
            </div>
            
            <div class="section-card">
                <div class="section-header">
                    <span class="section-dot"></span>
                    <span class="section-title">📅 Upcoming Matters (${upcomingMatters.length})</span>
                </div>
                <div class="form-body">
                    ${upcomingMatters.length === 0 ? 
                        '<p style="text-align:center;color:var(--muted);padding:20px;">No upcoming matters scheduled.</p>' :
                        upcomingMatters.map(matter => {
                            const matterDate = new Date(matter.date + 'T00:00:00');
                            const isToday = matter.date === today;
                            const isTomorrow = (() => {
                                const tomorrow = new Date();
                                tomorrow.setDate(tomorrow.getDate() + 1);
                                return matter.date === tomorrow.toISOString().slice(0, 10);
                            })();
                            
                            return `
                                <div style="background:#fafaf9;border-left:3px solid var(--gold);padding:12px;margin-bottom:10px;border-radius:6px;">
                                    <div style="display:flex;justify-content:space-between;align-items:start;">
                                        <div style="flex:1;">
                                            <strong style="font-size:14px;">${matter.title}</strong>
                                            ${isToday ? '<span style="background:#fef9f0;color:var(--gold-dark);padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;margin-left:8px;">TODAY</span>' : ''}
                                            ${isTomorrow ? '<span style="background:#fef9f0;color:var(--gold-dark);padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;margin-left:8px;">TOMORROW</span>' : ''}
                                        </div>
                                        <div style="display:flex;gap:6px;">
                                            <button onclick="editMatter(${matter.id})" 
                                                    style="background:#f0f0f0;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10px;">
                                                ✏️ Edit
                                            </button>
                                            <button onclick="deleteMatter(${matter.id})" 
                                                    style="background:#fde8e8;color:#8b2500;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10px;">
                                                🗑️ Delete
                                            </button>
                                        </div>
                                    </div>
                                    <div style="font-size:11px;color:var(--muted);margin-top:6px;">
                                        📅 ${matterDate.toLocaleDateString('en-KE', {weekday:'long', day:'numeric', month:'long', year:'numeric'})} | 🕐 ${matter.time}
                                    </div>
                                    <div style="font-size:11px;color:var(--muted);margin-top:2px;">
                                        🏛️ ${matter.court} | 👨‍⚖️ ${matter.judge || 'TBA'}
                                    </div>
                                    <div style="font-size:11px;color:var(--muted);margin-top:2px;">
                                        📁 ${matter.caseNo || 'N/A'} | 👤 ${matter.client || 'N/A'}
                                    </div>
                                </div>
                            `;
                        }).join('')
                    }
                </div>
            </div>
            
            ${pastMatters.length > 0 ? `
                <div class="section-card">
                    <div class="section-header">
                        <span class="section-dot"></span>
                        <span class="section-title">📂 Past Matters (${pastMatters.length})</span>
                    </div>
                    <div class="form-body">
                        ${pastMatters.slice(-5).reverse().map(matter => {
                            const matterDate = new Date(matter.date + 'T00:00:00');
                            return `
                                <div style="background:#fafaf9;border-left:3px solid #ccc;padding:10px;margin-bottom:8px;border-radius:6px;opacity:0.7;">
                                    <strong style="font-size:13px;">${matter.title}</strong>
                                    <div style="font-size:10px;color:var(--muted);margin-top:4px;">
                                        📅 ${matterDate.toLocaleDateString('en-KE', {day:'numeric', month:'short', year:'numeric'})} | 🏛️ ${matter.court}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            ` : ''}
            
            <button class="add-row-btn" onclick="addMatter()" style="margin-top:0;">
                📅 + Schedule New Matter
            </button>
        `;
    }
    
    function render() {
        const content = document.getElementById('mainContent');
        
        if (currentMainTab === 'BILLING') {
            document.getElementById('docNumber').textContent = documentInfo.number;
            content.innerHTML = renderBillingView();
        } else {
            document.getElementById('docNumber').textContent = 'MATTERS';
            content.innerHTML = renderMattersView();
        }
    }
    
    // ────────────────────────────────────────────────────────────
    // EVENT HANDLERS
    // ────────────────────────────────────────────────────────────
    function switchMainTab(tab, element) {
        currentMainTab = tab;
        document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
        element.classList.add('active');
        render();
    }
    
    function switchBillingTab(tab) {
        currentBillingTab = tab;
        const prefixes = { FEE_NOTE: 'FBN-', INVOICE: 'INV-', RECEIPT: 'RCT-' };
        const suffixes = { FEE_NOTE: '2024-001', INVOICE: '2024-089', RECEIPT: '2024-089' };
        documentInfo.number = prefixes[tab] + suffixes[tab];
        render();
    }
    
    function updateDocumentField(field, value) {
        documentInfo[field] = value;
        if (field === 'number') {
            document.getElementById('docNumber').textContent = value;
        }
        render();
    }
    
    function updateClientField(field, value) {
        documentInfo.client[field] = value;
        render();
    }
    
    function updatePaymentStatus(status) {
        paymentStatus = status;
        render();
    }
    
    function updateDiscount(value) {
        discountPercent = parseFloat(value) || 0;
        render();
    }
    
    function updateVAT(value) {
        vatPercent = parseFloat(value) || 0;
        render();
    }
    
    // ────────────────────────────────────────────────────────────
    // INITIALIZATION
    // ────────────────────────────────────────────────────────────
    window.switchMainTab = switchMainTab;
    window.switchBillingTab = switchBillingTab;
    window.updateDocumentField = updateDocumentField;
    window.updateClientField = updateClientField;
    window.updatePaymentStatus = updatePaymentStatus;
    window.updateDiscount = updateDiscount;
    window.updateVAT = updateVAT;
    window.addLineItem = addLineItem;
    window.removeLineItem = removeLineItem;
    window.updateLineItem = updateLineItem;
    window.shareToWhatsApp = shareToWhatsApp;
    window.downloadPDF = downloadPDF;
    window.quickShare = quickShare;
    window.addMatter = addMatter;
    window.editMatter = editMatter;
    window.deleteMatter = deleteMatter;
    
    // Pre-load libraries
    initLibraries().catch(() => {});
    
    // Initial render
    render();
    
    // Check for upcoming matters every hour
    setInterval(() => {
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        const tomorrowStr = tomorrow.toISOString().slice(0, 10);
        const tomorrowMatters = matters.filter(m => m.date === tomorrowStr);
        if (tomorrowMatters.length > 0 && currentMainTab !== 'MATTERS') {
            showNotification(`🔔 ${tomorrowMatters.length} matter(s) scheduled for tomorrow!`, 4000);
        }
    }, 3600000);
</script>
</body>
</html>
